<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Summary - Vilarci</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; background-color: #f8fafc; } main { margin-top: 80px; }</style>
</head>
<body>

    <div id="vilarci-header"></div>

    <main class="max-w-6xl mx-auto px-4 py-6">
        <h1 class="text-3xl font-extrabold text-slate-900 mb-2">Order Summary</h1>
        <p class="text-slate-500 font-medium mb-6" id="checkout-subtitle">Secure Checkout</p>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 space-y-6" id="checkout-container">
                <div class="text-center py-12 bg-white rounded-xl border border-slate-200 shadow-sm">
                    <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-red-600 mx-auto"></div>
                    <p class="text-slate-500 mt-4 font-medium">Securing your order details...</p>
                </div>
            </div>

            <div class="lg:col-span-1 space-y-6">
                
                <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
                    <h3 class="font-bold text-slate-800 mb-3 flex items-center gap-2"><i data-lucide="tag" class="w-4 h-4 text-red-500"></i> Apply Promo Code</h3>
                    <div class="flex gap-2">
                        <input type="text" id="promo-input" placeholder="Enter code here" class="flex-grow bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm font-semibold outline-none focus:border-red-400 uppercase">
                        <button onclick="applyPromo()" class="bg-slate-800 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-slate-900 transition">Apply</button>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 sticky top-24">
                    <h3 class="text-lg font-bold text-slate-900 border-b border-slate-100 pb-4 mb-4">Price Details</h3>
                    
                    <div class="space-y-3 text-sm text-slate-600 mb-6" id="price-details-container">
                        </div>
                    
                    <div class="border-t border-slate-200 pt-4 mb-6">
                        <div class="flex justify-between items-center">
                            <span class="font-bold text-slate-900 text-lg">Grand Total</span>
                            <span class="text-2xl font-extrabold text-red-600" id="summ-grand-total">₹0.00</span>
                        </div>
                    </div>

                    <button id="place-order-btn" onclick="placeOrder()" class="w-full py-3.5 bg-red-600 text-white rounded-xl font-bold text-lg hover:bg-red-700 transition shadow-lg shadow-red-200 flex justify-center items-center gap-2">
                        Proceed to Pay <i data-lucide="shield-check" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <div id="address-modal" class="fixed inset-0 bg-slate-900/60 z-50 hidden flex items-center justify-center backdrop-blur-sm">
        <div class="bg-white p-8 rounded-2xl max-w-md w-full text-center shadow-2xl transform scale-95 transition-transform">
            <div class="w-16 h-16 bg-red-50 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4"><i data-lucide="map-pin" class="w-8 h-8"></i></div>
            <h2 class="text-2xl font-extrabold text-slate-900 mb-2">Delivery Address Required</h2>
            <p class="text-slate-500 mb-6">You need to set a default delivery address before proceeding with a normal or rapid checkout.</p>
            <button onclick="window.location.href='profile.html'" class="w-full bg-red-600 text-white py-3 rounded-xl font-bold hover:bg-red-700">Add Address Now</button>
        </div>
    </div>

    <script src="header.js"></script>
    <script>
        const sb = window.supabaseClient;
        const urlParams = new URLSearchParams(window.location.search);
        const cartType = urlParams.get('type') || 'normal';
        let checkoutData = null;

        document.getElementById('checkout-subtitle').innerText = 
            cartType === 'rapid' ? '⚡ Rapid Delivery (30 Min)' : 
            cartType === 'pickup' ? '🏪 Store Pick Up' : '🚚 Standard Delivery';

        async function initCheckout() {
            lucide.createIcons();
            const { data: { session } } = await sb.auth.getSession();
            if (!session) { window.location.href = "user_login.html"; return; }

            try {
                // Call the secure Edge Function
                const { data, error } = await sb.functions.invoke('calculate-checkout', {
                    body: { cart_type: cartType }
                });

                if (error) throw error;
                if (data.error === 'MISSING_ADDRESS') {
                    document.getElementById('address-modal').classList.remove('hidden');
                    return;
                }

                checkoutData = data;
                renderCheckoutUI();

            } catch (err) {
                document.getElementById('checkout-container').innerHTML = `<div class="p-6 bg-red-50 text-red-600 font-bold rounded-xl">Error: ${err.message}</div>`;
            }
        }

        function renderCheckoutUI() {
            const container = document.getElementById('checkout-container');
            
            if (!checkoutData || !checkoutData.price_details) {
                container.innerHTML = `<div class="p-6 bg-red-50 text-red-600 font-bold rounded-xl">Error: Invalid data received from server.</div>`;
                return;
            }

            const prices = checkoutData.price_details;
            let html = "";
            let hasDeliveryError = false;

            // Render Sellers Safely
            checkoutData.sellers.forEach((seller) => {
                if(seller.delivery_error) hasDeliveryError = true;

                const errorBanner = seller.delivery_error 
                    ? `<div class="bg-red-50 text-red-600 px-4 py-2 text-sm font-bold border-b border-red-100 flex items-center gap-2"><i data-lucide="alert-circle" class="w-4 h-4"></i> ${seller.delivery_error}</div>` 
                    : '';

                // Smart Badges for Delivery & Rapid
                let deliveryBadge = '';
                if (cartType === 'pickup') {
                    deliveryBadge = `<span class="bg-indigo-100 text-indigo-700 px-2 py-1 rounded text-xs font-bold">Pick Up (Free)</span>`;
                } else {
                     const fee = Number(seller.delivery_fee) || 0;
                     deliveryBadge = `<span class="bg-slate-100 text-slate-700 px-2 py-1 rounded text-xs font-bold">Delivery: ${fee === 0 ? 'Free' : '₹'+fee}</span>`;
                }
                
                let rapidBadge = '';
                // Ensure rapid fee exists and is a number
                const rapidAmount = Number(seller.rapid_fee) || 0;
                if (cartType === 'rapid' && !seller.delivery_error && rapidAmount > 0) {
                     rapidBadge = `<span class="bg-amber-100 text-amber-700 px-2 py-1 rounded text-xs font-bold flex items-center gap-1"><i data-lucide="zap" class="w-3 h-3"></i> ₹${rapidAmount}</span>`;
                }

                let addressInfo = '';
                if (cartType === 'pickup') {
                    const addr = seller.full_address || "Address unavailable";
                    const dir = seller.shop_direction || "N/A";
                    addressInfo = `
                        <div class="mt-3 bg-slate-50 p-3 rounded-lg border border-slate-200">
                            <p class="text-xs font-bold text-slate-500 uppercase mb-1">Store Address</p>
                            <p class="text-sm font-semibold text-slate-800">${addr}</p>
                            <p class="text-xs text-slate-500 mt-1">Direction: ${dir}</p>
                        </div>
                    `;
                }

                let messageBox = '';
                if (cartType !== 'rapid') {
                    messageBox = `
                        <div class="mt-4 pt-4 border-t border-slate-100">
                            <label class="block text-xs font-bold text-slate-500 mb-1">Message for Seller (Optional)</label>
                            <textarea id="msg-${seller.seller_id}" maxlength="300" placeholder="Any specific instructions for this seller?" class="w-full bg-slate-50 border border-slate-200 rounded-lg p-2 text-sm outline-none focus:border-red-400 resize-none h-16"></textarea>
                            <div class="text-right text-[10px] text-slate-400 mt-1">Max 300 characters</div>
                        </div>
                    `;
                }

                let itemsHtml = seller.items.map(item => {
                    const mrp = Number(item.mrp_price) || Number(item.original_price) || Number(item.base_price); 
                    const img = item.image || 'placeholder.jpg';
                    const name = item.name || 'Product';
                    
                    return `
                    <div class="flex items-center gap-4 py-3">
                        <img src="${img}" class="w-16 h-16 object-contain bg-slate-50 rounded border border-slate-200 p-1 mix-blend-multiply">
                        <div class="flex-grow">
                            <h4 class="font-bold text-slate-800 text-sm">${name}</h4>
                            <p class="text-xs text-slate-500 mt-0.5">Qty: ${item.qty} × ₹${item.base_price}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-xs text-slate-400 line-through">₹${mrp * item.qty}</p>
                            <p class="font-extrabold text-slate-900">₹${item.total_price}</p>
                        </div>
                    </div>
                    `;
                }).join('');

                // Ensure seller total exists and is a number
                const sTotal = Number(seller.seller_total) || 0;

                html += `
                    <div class="bg-white rounded-xl border ${seller.delivery_error ? 'border-red-300 shadow-sm' : 'border-slate-200 shadow-sm'} overflow-hidden mb-6">
                        ${errorBanner}
                        <div class="bg-slate-50 px-5 py-3 border-b border-slate-200 flex items-center justify-between">
                            <h3 class="font-bold text-slate-900">${seller.store_name || "Seller"}</h3>
                            <div class="flex gap-2 items-center">
                                ${deliveryBadge}
                                ${rapidBadge}
                            </div>
                        </div>
                        <div class="p-5 pb-4">
                            <div class="divide-y divide-slate-100">${itemsHtml}</div>
                            ${addressInfo}
                            ${messageBox}
                        </div>
                        ${!seller.delivery_error ? `
                        <div class="bg-slate-50 px-5 py-3 border-t border-slate-200 flex justify-between items-center">
                            <span class="text-sm font-bold text-slate-500">Seller Total</span>
                            <span class="text-lg font-extrabold text-slate-900">₹${sTotal}</span>
                        </div>
                        ` : ''}
                    </div>
                `;
            });

            container.innerHTML = html;

            // Render Global Price Details
            let priceHtml = `
                <div class="flex justify-between"><span>Total MRP</span><span class="font-bold text-slate-800">₹${prices.total_listing_price}</span></div>
                <div class="flex justify-between text-green-600"><span>Discount</span><span class="font-bold">-₹${prices.total_discount}</span></div>
            `;
            
            if (cartType !== 'pickup') {
                priceHtml += `<div class="flex justify-between"><span>Delivery Charges</span><span class="font-bold text-slate-800">₹${prices.delivery_fee}</span></div>`;
            }
            if (cartType === 'rapid') {
                priceHtml += `<div class="flex justify-between text-amber-600"><span class="flex items-center gap-1"><i data-lucide="zap" class="w-4 h-4"></i> Rapid Fee</span><span class="font-bold">₹${prices.rapid_platform_fee}</span></div>`;
            }

            document.getElementById('price-details-container').innerHTML = priceHtml;
            document.getElementById('summ-grand-total').innerText = `₹${prices.grand_total}`;

            if(hasDeliveryError) {
                const btn = document.getElementById('place-order-btn');
                if(btn) {
                    btn.disabled = true;
                    btn.classList.replace('bg-red-600', 'bg-slate-400');
                    btn.classList.replace('hover:bg-red-700', 'cursor-not-allowed');
                    btn.innerText = "Cannot deliver to your location";
                }
            }

            if(window.lucide) window.lucide.createIcons();
        }

        function applyPromo() {
            Toastify({ text: "Promo codes will be activated soon!", duration: 3000, style: { background: "#3b82f6", borderRadius: "8px" } }).showToast();
        }

        window.placeOrder = async function() {
            const btn = document.getElementById('place-order-btn');
            btn.innerHTML = `<div class="animate-spin rounded-full h-5 w-5 border-b-2 border-white"></div> Processing...`;
            btn.disabled = true;

            // 1. Gather messages for sellers securely
            const sellerNotes = {};
            checkoutData.sellers.forEach(seller => {
                const textarea = document.getElementById(`msg-${seller.seller_id}`);
                if (textarea && textarea.value.trim() !== '') {
                    sellerNotes[seller.seller_id] = textarea.value.trim();
                }
            });

            // 2. Determine Payment Method
            // For now, if Pickup -> Cash on Shop (COS). If Delivery -> Cash on Delivery (COD)
            const paymentMethod = cartType === 'pickup' ? 'COS' : 'COD';

            try {
                // 3. Call the Secure Vault
                const { data, error } = await sb.functions.invoke('create-order', {
                    body: { 
                        cart_type: cartType,
                        payment_method: paymentMethod,
                        seller_notes: sellerNotes
                    }
                });

                if (error || data.error) throw new Error(error?.message || data.error);

                // 4. Success! Redirect to an Order Success Page
                Toastify({ text: "Order Placed Successfully! 🎉", duration: 3000, style: { background: "#22c55e", borderRadius: "8px" } }).showToast();
                
                // Update header cart count
                if(typeof window.updateGlobalCartCount === 'function') window.updateGlobalCartCount();
                
                // Redirect user after 1.5 seconds so they see the success message
                setTimeout(() => {
                    window.location.href = `order-success.html?order_id=${data.order_id}`;
                }, 1500);

            } catch (err) {
                console.error(err);
                btn.innerHTML = `Proceed to Pay <i data-lucide="shield-check" class="w-5 h-5"></i>`;
                btn.disabled = false;
                Toastify({ text: err.message || "Failed to place order.", duration: 4000, style: { background: "#ef4444", borderRadius: "8px" } }).showToast();
            }
        }

        document.addEventListener('DOMContentLoaded', initCheckout);
    </script>
</body>
</html>
