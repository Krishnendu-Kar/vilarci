<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Login - Vilarci</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="config.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col justify-center py-12 sm:px-6 lg:px-8">

    <div class="sm:mx-auto sm:w-full sm:max-w-md">
        <div class="flex justify-center items-center gap-2 mb-8">
            <div class="bg-indigo-600 text-white font-bold text-2xl px-4 py-2 rounded-lg shadow-lg">V</div>
            <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Vilarci <span class="text-indigo-600">Seller</span></h1>
        </div>
        <h2 class="mt-2 text-center text-sm text-slate-600">
            Manage your store, products, and deliveries.
        </h2>
    </div>

    <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
        <div class="bg-white py-8 px-4 shadow-xl sm:rounded-xl sm:px-10 border border-slate-100">
            
            <div id="alertBox" class="hidden mb-6 bg-red-50 border-l-4 border-red-500 p-4 rounded-md">
                <div class="flex">
                    <div class="flex-shrink-0">
                        <i data-lucide="alert-circle" class="h-5 w-5 text-red-500"></i>
                    </div>
                    <div class="ml-3">
                        <h3 id="alertTitle" class="text-sm font-medium text-red-800">Error</h3>
                        <div class="mt-1 text-sm text-red-700">
                            <p id="alertMsg">Something went wrong.</p>
                        </div>
                    </div>
                </div>
            </div>

            <form id="loginForm" class="space-y-6" onsubmit="event.preventDefault();">
                <div>
                    <label for="identifier" class="block text-sm font-medium text-slate-700">WhatsApp Number or Email</label>
                    <div class="mt-1 relative rounded-md shadow-sm">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i data-lucide="user" class="h-5 w-5 text-slate-400"></i>
                        </div>
                        <input id="identifier" name="identifier" type="text" required class="block w-full pl-10 pr-3 py-2.5 border border-slate-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm transition-colors" placeholder="10-digit number or Email">
                    </div>
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-slate-700">Password</label>
                    <div class="mt-1 relative rounded-md shadow-sm">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i data-lucide="lock" class="h-5 w-5 text-slate-400"></i>
                        </div>
                        <input id="password" name="password" type="password" required class="block w-full pl-10 pr-3 py-2.5 border border-slate-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm transition-colors" placeholder="••••••••">
                    </div>
                </div>

                <div>
                    <button type="submit" id="loginBtn" class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-all">
                        Sign In to Dashboard
                    </button>
                </div>
            </form>

            <div class="mt-6">
                <div class="relative">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-slate-300"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-2 bg-white text-slate-500">New to Vilarci Sellers?</span>
                    </div>
                </div>

                <div class="mt-6">
                    <a href="seller registration.html" class="w-full flex justify-center py-2.5 px-4 border border-slate-300 rounded-lg shadow-sm text-sm font-medium text-slate-700 bg-white hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-all">
                        Create new seller account
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            const btn = document.getElementById('loginBtn');
            const alertBox = document.getElementById('alertBox');
            const alertTitle = document.getElementById('alertTitle');
            const alertMsg = document.getElementById('alertMsg');
            
            btn.disabled = true;
            btn.innerText = "Authenticating...";
            alertBox.classList.add('hidden');

            try {
                const identifier = document.getElementById('identifier').value.trim();
                const password = document.getElementById('password').value;

                // Format identifier for Unified Login
                let loginData = {};
                let finalIdentifier = identifier;
                if (/^\d{10}$/.test(identifier)) {
                    finalIdentifier = "+91" + identifier;
                }

                if (finalIdentifier.includes('@')) {
                    loginData = { email: finalIdentifier, password: password };
                } else {
                    loginData = { phone: finalIdentifier, password: password };
                }

                const supabase = window.supabaseClient;

                // A. Attempt Auth
                const { data: authData, error: authError } = await supabase.auth.signInWithPassword(loginData);

                if (authError) throw new Error("Invalid credentials. Please check your number/email and password.");

                // B. Get Profile & Verification Status Concurrently
                const [privateRes, publicRes] = await Promise.all([
                    supabase.from('sellers_private_089').select('seller_numeric_id').eq('id', authData.user.id).single(),
                    supabase.from('shops_public_587').select('is_verified').eq('id', authData.user.id).single()
                ]);

                // C. The "Not a Seller" Check
                if (privateRes.error || !privateRes.data) {
                    await supabase.auth.signOut(); // Sign them back out to keep things clean
                    throw new Error("You do not have a registered Seller account yet. Please click 'Create new seller account' below.");
                }
                
                const seller = privateRes.data;
                const shop = publicRes.data || { is_verified: false };

                // D. Check Verification
                if (!shop.is_verified) {
                    await supabase.auth.signOut();
                    throw new Error("Account pending approval. Please wait for Vilarci verification.");
                }

                // E. Success
                sessionStorage.setItem('vilarci_seller_id', seller.seller_numeric_id);
                window.location.href = 'seller_profile.html';

            } catch (err) {
                btn.disabled = false;
                btn.innerText = "Sign In to Dashboard";
                alertTitle.innerText = "Login Failed";
                alertMsg.innerText = err.message;
                alertBox.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
