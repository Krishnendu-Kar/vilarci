<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - Vilarci</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style> 
        body { font-family: 'Inter', sans-serif; } 
        
        .rating_avg {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            font-size: 0.85rem;
            font-weight: 700;
            background-color: #038D63;
            color: #ffffff;
            padding: 2px 6px;
            border-radius: 6px;
        }
        
        /* Hide scrollbar for thumbnails */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 font-sans min-h-screen pb-24 md:pb-8">

    <script src="header.js"></script>
    <div id="vilarci-header"></div>

    <div id="loader" class="flex flex-col items-center justify-center h-[70vh]">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600 mb-4"></div>
        <p class="text-slate-500 font-medium animate-pulse">Loading product details...</p>
    </div>

    <div id="error-screen" class="hidden flex flex-col items-center justify-center h-[70vh] text-center px-4">
        <div class="bg-red-50 p-5 rounded-full mb-4">
            <i data-lucide="package-x" class="w-12 h-12 text-red-500"></i>
        </div>
        <h2 class="text-2xl font-bold text-slate-800">Product Not Found</h2>
        <p class="text-slate-500 mt-2 max-w-md">The product you are looking for might have been removed, or the link is broken.</p>
        <button onclick="window.history.back()" class="mt-6 bg-indigo-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-indigo-700 transition shadow-lg">Go Back</button>
    </div>

    <main id="product-container" class="hidden max-w-6xl mx-auto px-4 py-6 md:py-10">
        <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
            <div class="grid grid-cols-1 lg:grid-cols-2">
                
                <div class="p-4 md:p-8 bg-slate-50 border-r border-slate-100 flex flex-col">
                    <div class="aspect-square bg-white rounded-2xl overflow-hidden shadow-sm relative group flex-grow flex items-center justify-center mb-4 border border-slate-100">
                        <span id="badge-label" class="absolute top-4 left-4 bg-red-500 text-white text-[10px] uppercase font-extrabold px-3 py-1.5 rounded-full hidden shadow-md z-10 tracking-wider">
                            SALE
                        </span>
                        <img id="main-image" src="" class="w-full h-full object-contain p-6 md:p-10 transition-transform duration-500 hover:scale-105">
                    </div>
                    
                    <div id="thumbnails" class="flex gap-3 overflow-x-auto no-scrollbar pb-2 hidden">
                        </div>
                </div>

                <div class="p-5 md:p-8 space-y-6 flex flex-col justify-center">
                    
                    <div>
                        <div class="flex items-center gap-3 mb-2">
                            <!-- <span id="category-tag" class="text-[10px] font-extrabold text-indigo-600 bg-indigo-50 px-2 py-1 rounded uppercase tracking-wider">Vilarci Verified</span> -->
                            <div class="flex items-center gap-1.5">
                                <div class="rating_avg"><span id="rating_avg"></span> <i class="fa-solid fa-star ml-1 text-[10px]"></i></div>
                                <span class="text-xs font-semibold text-slate-400" id="rating_count"></span>
                            </div>
                        </div>
                        
                        <h1 id="product-title" class="text-2xl sm:text-3xl font-extrabold text-slate-900 leading-tight mb-4">...</h1>
                        
                        <div class="flex items-end gap-3 bg-slate-50 p-4 rounded-2xl border border-slate-100 inline-flex w-full md:w-auto">
                            <span id="price-display" class="text-4xl font-extrabold text-slate-900 tracking-tight">₹0</span>
                            <div class="flex flex-col pb-1">
                                <span id="mrp-display" class="text-sm text-slate-400 line-through font-medium">₹0</span>
                                <span id="discount-display" class="text-xs font-bold text-green-600"></span>
                            </div>
                        </div>
                        <p class="text-[11px] text-slate-400 font-medium mt-2 ml-1">Inclusive of all taxes</p>
                    </div>

                    <div id="dynamic-logic-container" class="border-t border-slate-100 pt-6"></div>

                    <div class="pt-2">
                        <h3 class="font-bold text-slate-800 text-sm uppercase tracking-wide mb-3">Product Description</h3>
                        <p id="product-description" class="text-slate-600 text-sm leading-relaxed"></p>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 pt-2">
                        <div id="highlights-section" class="hidden bg-slate-50 p-4 rounded-xl">
                            <h3 class="font-bold text-slate-800 text-xs uppercase tracking-wider mb-3">Key Highlights</h3>
                            <div id="product-highlights" class="grid gap-2 text-sm text-slate-600 font-medium"></div>
                        </div> 
                        <div id="specs-section" class="hidden bg-slate-50 p-4 rounded-xl">
                            <h3 class="font-bold text-slate-800 text-xs uppercase tracking-wider mb-3">Specifications</h3>
                            <div id="specs-grid" class="grid grid-cols-2 gap-y-3 gap-x-2 text-sm"></div>
                        </div>
                    </div>

                    <div id="seller-card" class="mt-4 bg-white border-2 border-slate-100 rounded-2xl p-4 flex items-center justify-between cursor-pointer hover:border-indigo-200 hover:shadow-md transition group hidden">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-indigo-50 rounded-full flex items-center justify-center text-indigo-600 group-hover:bg-indigo-600 group-hover:text-white transition">
                                <i data-lucide="store" class="w-5 h-5"></i>
                            </div>
                            <div>
                                <p class="text-[10px] text-slate-400 font-extrabold uppercase tracking-wider mb-0.5">Sold By</p>
                                <h4 id="shop-name-display" class="font-bold text-slate-800 text-base leading-tight group-hover:text-indigo-600 transition">Loading...</h4>
                            </div>
                        </div>
                        <i data-lucide="chevron-right" class="w-5 h-5 text-slate-300 group-hover:text-indigo-600 transition transform group-hover:translate-x-1"></i>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <div id="action-bar" class="fixed bottom-0 left-0 w-full bg-white/90 backdrop-blur-md border-t border-slate-200 p-3 flex gap-2 z-50 shadow-[0_-10px_30px_rgba(0,0,0,0.05)] transition-transform duration-300 transform translate-y-full">
        
        <button onclick="addToCart()" class="w-14 h-14 shrink-0 bg-slate-100 text-slate-700 rounded-xl flex items-center justify-center hover:bg-slate-200 transition focus:ring-2 focus:ring-slate-300">
            <i data-lucide="shopping-cart" class="w-6 h-6"></i>
        </button>
        
        <button onclick="reservePickup()" class="flex-1 bg-white border-2 border-slate-900 text-slate-900 font-bold rounded-xl hover:bg-slate-50 transition flex justify-center items-center gap-2 text-[13px] sm:text-sm active:scale-95">
            <i data-lucide="store" class="w-4 h-4 hidden sm:block"></i> Store Pickup
        </button>
        
        <button onclick="buyNow()" class="flex-1 bg-indigo-600 text-white font-bold rounded-xl shadow-lg hover:bg-indigo-700 transition flex justify-center items-center gap-2 text-[13px] sm:text-sm active:scale-95">
            <i data-lucide="zap" class="w-4 h-4 hidden sm:block"></i> Buy Now
        </button>
    </div>

    <script src="config.js"></script>
    <script>
    // Configuration
    const db = window.supabaseClient;
    
    let currentProduct = {};
    let selectedPrice = 0;
    let selectedWeightLabel = "";

    async function initPage() {
        lucide.createIcons();
        
        const urlParams = new URLSearchParams(window.location.search);
        const slug = urlParams.get('slug'); 
        const idFallback = urlParams.get('id');

        let query = db.from('products').select('*');

        if (slug) query = query.eq('slug', slug);
        else if (idFallback) query = query.eq('id', idFallback);
        else { showError(); return; }

        const { data, error } = await query.single();

        if (error || !data) {
            showError();
            return;
        }

        currentProduct = data;
        renderUniversalData(data);
        
        // Product Logic Routing
        const idString = data.id.toString();
        const fashionCode = idString.length >= 8 ? idString.substring(6, 8) : "00"; 
        const subAreaCode = idString.length >= 11 ? idString.substring(8, 11) : "000"; 

        if (fashionCode === '12') renderFashionInterface(data);
        else if (subAreaCode === '185') renderWeightableInterface(data);
        else renderPacketInterface(data);

        // Fetch Shop Info
        fetchSellerInfo(data.seller_id);

        // Show UI
        document.getElementById('loader').classList.add('hidden');
        document.getElementById('product-container').classList.remove('hidden');
        
        // Slide up the action bar
        setTimeout(() => {
            document.getElementById('action-bar').classList.remove('translate-y-full');
        }, 300);
        
        updateGlobalCartCount();
    }

    function renderUniversalData(product) {
        // Ratings
        document.getElementById('rating_avg').innerText = product.rating_avg || 4.5;
        document.getElementById('rating_count').innerText = product.rating_count > 0 
            ? `${product.rating_count} Ratings` : 'No Ratings';

        document.getElementById('product-title').innerText = product.name;
        document.getElementById('product-description').innerText = product.description || "No description available for this product.";
        
        // Gallery
        const mainImg = document.getElementById('main-image');
        const thumbContainer = document.getElementById('thumbnails');
        thumbContainer.innerHTML = ''; 

        if (product.images && product.images.length > 0) {
            mainImg.src = product.images[0];
            if (product.images.length > 1) {
                thumbContainer.classList.remove('hidden');
                product.images.forEach((imgUrl, index) => {
                    const thumb = document.createElement('img');
                    thumb.src = imgUrl;
                    thumb.className = `w-16 h-16 object-cover rounded-xl border-2 cursor-pointer transition flex-shrink-0 ${index === 0 ? 'border-indigo-600 shadow-md' : 'border-slate-200 hover:border-indigo-300'}`;
                    
                    thumb.onmouseover = () => {
                        mainImg.src = imgUrl;
                        Array.from(thumbContainer.children).forEach(t => {
                            t.classList.remove('border-indigo-600', 'shadow-md');
                            t.classList.add('border-slate-200');
                        });
                        thumb.classList.remove('border-slate-200');
                        thumb.classList.add('border-indigo-600', 'shadow-md');
                    };
                    thumbContainer.appendChild(thumb);
                });
            }
        } else {
            mainImg.src = "logo.png";
        }

        // Badge
        if (product.badge_label) {
            const badge = document.getElementById('badge-label');
            badge.innerText = product.badge_label;
            badge.classList.remove('hidden');
        }

        // Highlights
        if (product.highlights && product.highlights.length > 0) {
            document.getElementById('highlights-section').classList.remove('hidden');
            const div = document.getElementById('product-highlights');
            div.innerHTML = ''; 
            product.highlights.forEach(h => {
                div.innerHTML += `<div class="flex gap-2 items-start"><i data-lucide="check-circle2" class="w-4 h-4 text-green-500 mt-0.5 shrink-0"></i> <span>${h}</span></div>`;
            });
        }

        // Specifications
        if (product.specifications) {
            document.getElementById('specs-section').classList.remove('hidden');
            const grid = document.getElementById('specs-grid');
            grid.innerHTML = ''; 
            Object.entries(product.specifications).forEach(([k, v]) => {
                if(typeof v !== 'object') {
                    grid.innerHTML += `
                        <div class="text-slate-400 font-medium truncate">${k}</div>
                        <div class="text-slate-800 font-semibold truncate text-right">${v}</div>
                    `;
                }
            });
        }
    }

    // --- FETCH SELLER INFO ---
    async function fetchSellerInfo(numericId) {
        if (!numericId) return;
        
        const { data, error } = await db
            .from('shops_public_587')
            .select('store_name, shop_slug')
            .eq('seller_numeric_id', numericId.toString())
            .single();
        
        const sellerCard = document.getElementById('seller-card');
        const shopNameDisplay = document.getElementById('shop-name-display');

        sellerCard.classList.remove('hidden');

        if (!error && data) {
            shopNameDisplay.innerText = data.store_name || "Vilarci Verified Seller";
            sellerCard.onclick = () => window.location.href = `shop_profile.html?slug=${data.shop_slug || numericId}`;
        } else {
            shopNameDisplay.innerText = "Vilarci Verified Seller";
            // Remove hover effects if no link
            sellerCard.classList.remove('cursor-pointer', 'hover:border-indigo-200', 'hover:shadow-md');
            sellerCard.querySelector('i[data-lucide="chevron-right"]').classList.add('hidden');
        }
        lucide.createIcons();
    }


    // ==========================================
    // INTERFACES (Weight, Fashion, Packet)
    // ==========================================

    function renderWeightableInterface(product) {
        const container = document.getElementById('dynamic-logic-container');
        const bulkRules = product.bulk_rules || [];

        let html = `
            <div class="space-y-4">
                <div class="flex items-center justify-between">
                    <h3 class="font-bold text-slate-800 text-xs uppercase tracking-wider">Select Quantity</h3>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3" id="bulk-options-container">`;

        bulkRules.forEach((rule, index) => {
            const basePricePerGram = product.base_price / 1000; 
            let calcPrice = (rule.unit === 'gm' ? rule.min_qty : rule.min_qty * 1000) * basePricePerGram;
            
            let quantityLabel = rule.min_qty < 1000 && rule.unit === 'gm' ? `${rule.min_qty} gm` : `${rule.min_qty/1000} kg`;
            if(rule.unit !== 'gm' && rule.unit !== 'kg') quantityLabel = `${rule.min_qty} ${rule.unit}`;

            const finalPrice = Math.round(calcPrice - (rule.discount_amount || 0));
            const saved = Math.round(rule.discount_amount || 0);

            if(index === 0) {
                updatePriceUI(finalPrice, Math.round(calcPrice));
                selectedWeightLabel = quantityLabel;
            }

            html += `
                <div onclick="selectWeight(this, ${finalPrice}, ${Math.round(calcPrice)}, '${quantityLabel}')" 
                     class="weight-option cursor-pointer border rounded-2xl p-4 flex justify-between items-center transition-all ${index === 0 ? 'border-indigo-600 bg-indigo-50/50 ring-1 ring-indigo-600' : 'border-slate-200 bg-white hover:border-slate-300'}">
                    <div class="flex flex-col">
                        <p class="font-bold text-slate-800 text-lg">${quantityLabel}</p>
                        ${saved > 0 ? `<p class="text-[10px] text-green-600 font-bold uppercase tracking-wide">Save ₹${saved}</p>` : ''}
                    </div>
                    <p class="font-extrabold text-indigo-700 text-xl">₹${finalPrice}</p>
                </div>`;
        });

        html += `</div>
                <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 mt-2">
                    <h4 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3">Custom Amount</h4>
                    <div class="flex items-center gap-3">
                        <div class="relative flex-1">
                            <input type="number" id="custom-weight" placeholder="0" 
                                class="w-full pl-3 pr-8 py-3 bg-white border border-slate-200 rounded-xl text-sm font-bold text-slate-800 focus:ring-2 focus:ring-indigo-500 outline-none transition"
                                oninput="calculateCustom('weight', this.value)">
                            <span class="absolute right-3 top-3.5 text-xs font-bold text-slate-400">gm</span>
                        </div>
                        <i data-lucide="arrow-left-right" class="w-4 h-4 text-slate-300"></i>
                        <div class="relative flex-1">
                            <span class="absolute left-3 top-3.5 text-xs font-bold text-slate-400">₹</span>
                            <input type="number" id="custom-cost" placeholder="0" 
                                class="w-full pl-7 pr-3 py-3 bg-white border border-slate-200 rounded-xl text-sm font-bold text-slate-800 focus:ring-2 focus:ring-indigo-500 outline-none transition"
                                oninput="calculateCustom('cost', this.value)">
                        </div>
                    </div>
                </div>
            </div>`;

        container.innerHTML = html;
        lucide.createIcons();
    }

    function renderFashionInterface(product) {
        const container = document.getElementById('dynamic-logic-container');
        const variants = product.variants || []; 

        let html = `
            <div class="space-y-4">
                <div class="flex justify-between items-center">
                    <h3 class="font-bold text-slate-800 text-xs uppercase tracking-wider">Select Size</h3>
                </div>
                <div class="flex flex-wrap gap-3">`;

        if(variants.length === 0) {
            html += `<p class="text-sm text-slate-500 w-full">No sizes available.</p>`;
        } else {
            variants.forEach(v => {
                const isOutOfStock = v.stock <= 0;
                const baseClass = "cursor-pointer border-2 rounded-xl h-12 min-w-[3rem] px-4 flex flex-col items-center justify-center transition-all relative overflow-hidden group font-bold";
                const stockClass = isOutOfStock 
                    ? "bg-slate-50 border-slate-200 text-slate-400 opacity-60 cursor-not-allowed" 
                    : "bg-white border-slate-200 text-slate-700 hover:border-indigo-600 hover:text-indigo-600";
                
                const clickAction = isOutOfStock ? "" : `selectFashionVariant(this, '${v.size}', ${v.price}, '${v.sku}')`;

                html += `
                    <div onclick="${clickAction}" class="variant-option ${baseClass} ${stockClass}">
                        ${v.size}
                        ${!isOutOfStock && v.stock < 5 ? `<span class="absolute bottom-0.5 text-[8px] text-red-500 font-extrabold uppercase">Few Left</span>` : ''}
                        ${isOutOfStock ? `<div class="absolute inset-0 flex items-center justify-center"><div class="w-full h-[2px] bg-slate-300 -rotate-45"></div></div>` : ''}
                    </div>`;
            });
        }

        html += `</div>
                <div id="fashion-warning" class="hidden text-xs text-red-500 font-bold flex items-center gap-1 bg-red-50 p-2 rounded-lg">
                    <i data-lucide="alert-triangle" class="w-4 h-4"></i> Please select a size to continue
                </div>
            </div>`;

        container.innerHTML = html;
        selectedWeightLabel = ""; 
        selectedPrice = product.base_price; 
        updatePriceUI(selectedPrice, product.original_price);
        lucide.createIcons();
    }

    function renderPacketInterface(product) {
        const container = document.getElementById('dynamic-logic-container');
        
        let stockStatus = product.stock_quantity > 10 
            ? `<span class="text-green-600 font-bold flex items-center gap-1 text-xs uppercase tracking-wider"><i data-lucide="check-circle2" class="w-4 h-4"></i> In Stock</span>`
            : `<span class="text-orange-500 font-bold text-xs uppercase tracking-wider flex items-center gap-1"><i data-lucide="alert-circle" class="w-4 h-4"></i> Only ${product.stock_quantity} left</span>`;
        
        if(product.stock_quantity <= 0) stockStatus = `<span class="text-red-500 font-bold text-xs uppercase tracking-wider flex items-center gap-1"><i data-lucide="x-circle" class="w-4 h-4"></i> Out of Stock</span>`;

        container.innerHTML = `
            <div class="flex flex-col gap-5">
                <div class="flex justify-between items-center bg-slate-50 p-4 rounded-xl border border-slate-100">
                    <span class="text-xs font-bold text-slate-500 uppercase tracking-wider">Availability</span>
                    ${stockStatus}
                </div>
                
                <div class="flex justify-between items-center">
                    <h3 class="font-bold text-slate-800 text-xs uppercase tracking-wider">Quantity</h3>
                    <div class="flex items-center bg-white border-2 border-slate-200 rounded-xl overflow-hidden shadow-sm h-11">
                        <button onclick="updatePacketQty(-1)" class="w-11 h-full text-slate-500 hover:bg-slate-100 hover:text-indigo-600 transition font-bold text-lg flex items-center justify-center">-</button>
                        <input type="text" id="packet-qty" value="1" class="w-12 h-full text-center text-sm font-bold text-slate-900 outline-none border-x border-slate-200" readonly>
                        <button onclick="updatePacketQty(1)" class="w-11 h-full text-slate-500 hover:bg-slate-100 hover:text-indigo-600 transition font-bold text-lg flex items-center justify-center">+</button>
                    </div>
                </div>
            </div>`;
        
        selectedWeightLabel = product.amount || "1 Unit"; 
        updatePriceUI(product.base_price, product.original_price);
        lucide.createIcons();
    }

    // ==========================================
    // SELECTION LOGIC
    // ==========================================

    window.selectWeight = function(element, price, mrp, label) {
        document.getElementById('custom-weight').value = '';
        document.getElementById('custom-cost').value = '';

        document.querySelectorAll('.weight-option').forEach(el => {
            el.className = 'weight-option cursor-pointer border-2 border-slate-100 bg-white rounded-2xl p-4 flex justify-between items-center hover:border-slate-300 transition-all';
        });

        element.className = 'weight-option cursor-pointer border-2 border-indigo-600 bg-indigo-50/50 rounded-2xl p-4 flex justify-between items-center transition-all shadow-sm';

        selectedWeightLabel = label;
        updatePriceUI(price, mrp);
    }

    window.calculateCustom = function(mode, value) {
        document.querySelectorAll('.weight-option').forEach(el => {
            el.className = 'weight-option cursor-pointer border-2 border-slate-100 bg-white rounded-2xl p-4 flex justify-between items-center transition-all opacity-50';
        });

        const val = parseFloat(value);
        if (!val || val <= 0) {
            if(mode === 'weight') document.getElementById('custom-cost').value = '';
            if(mode === 'cost') document.getElementById('custom-weight').value = '';
            return;
        }

        const pricePerGram = currentProduct.base_price / 1000;

        if (mode === 'weight') {
            const cost = Math.round(val * pricePerGram);
            document.getElementById('custom-cost').value = cost;
            selectedPrice = cost;
            selectedWeightLabel = `${val} gm (Custom)`;
        } else {
            const weight = Math.round(val / pricePerGram);
            document.getElementById('custom-weight').value = weight;
            selectedPrice = Math.round(val);
            selectedWeightLabel = `${weight} gm (Custom)`;
        }

        updatePriceUI(selectedPrice, 0); 
    }

    window.selectFashionVariant = function(element, size, price, sku) {
        document.querySelectorAll('.variant-option').forEach(el => {
            if(!el.classList.contains('opacity-60')) {
                el.className = "variant-option cursor-pointer border-2 border-slate-200 bg-white text-slate-700 rounded-xl h-12 min-w-[3rem] px-4 flex flex-col items-center justify-center transition-all hover:border-indigo-600 hover:text-indigo-600 relative overflow-hidden group font-bold";
            }
        });

        element.className = "variant-option cursor-pointer border-2 border-indigo-600 bg-indigo-600 text-white rounded-xl h-12 min-w-[3rem] px-4 flex flex-col items-center justify-center transition-all relative overflow-hidden font-bold shadow-md transform scale-105";

        selectedPrice = price; 
        selectedWeightLabel = `Size: ${size}`; 
        
        updatePriceUI(selectedPrice, currentProduct.original_price);
        document.getElementById('fashion-warning').classList.add('hidden');
    }

    window.updatePacketQty = function(change) {
        const input = document.getElementById('packet-qty');
        let val = parseInt(input.value) + change;
        
        if(val < 1) val = 1;
        if(currentProduct.stock_quantity && val > currentProduct.stock_quantity) {
            Toastify({ text: `Max stock is ${currentProduct.stock_quantity}`, duration: 2000, style: { background: "#ef4444" } }).showToast();
            val = currentProduct.stock_quantity;
        }
        
        input.value = val;
        selectedWeightLabel = `${val} Units`;
        updatePriceUI(currentProduct.base_price * val, currentProduct.original_price * val);
    }

    function updatePriceUI(price, mrp) {
        selectedPrice = price; 
        document.getElementById('price-display').innerText = `₹${price}`;
        
        if (mrp && mrp > price) {
            document.getElementById('mrp-display').innerText = `₹${mrp}`;
            const discount = Math.round(((mrp - price) / mrp) * 100);
            document.getElementById('discount-display').innerText = `${discount}% OFF`;
        } else {
            document.getElementById('mrp-display').innerText = '';
            document.getElementById('discount-display').innerText = '';
        }
    }

    // ==========================================
    // ACTION BUTTONS
    // ==========================================

    function checkFashionSelection() {
        const idString = currentProduct.id.toString();
        const fashionCode = idString.length >= 8 ? idString.substring(6, 8) : "";
        if (fashionCode === '12' && (!selectedWeightLabel || selectedWeightLabel === "")) {
            document.getElementById('fashion-warning').classList.remove('hidden');
            Toastify({ text: "Please select a size", duration: 3000, style: { background: "#ef4444" } }).showToast();
            return false;
        }
        return true;
    }

    function addToCart() {
        if(!checkFashionSelection()) return;

        const uniqueKey = `${currentProduct.slug}-${selectedWeightLabel.replace(/\s+/g, '-')}`;
        const cartItem = {
            cartItemId: uniqueKey,
            id: currentProduct.id,
            slug: currentProduct.slug,
            name: currentProduct.name,
            price: selectedPrice,
            originalPrice: currentProduct.original_price || selectedPrice,
            amount: selectedWeightLabel,
            image: (currentProduct.images && currentProduct.images.length > 0) ? currentProduct.images[0] : "",
            quantity: 1
        };

        let cart = JSON.parse(localStorage.getItem('cart') || "[]");
        const existingIndex = cart.findIndex(i => i.cartItemId === uniqueKey);

        if (existingIndex > -1) cart[existingIndex].quantity += 1; 
        else cart.push(cartItem); 

        localStorage.setItem('cart', JSON.stringify(cart));
        updateGlobalCartCount();

        Toastify({
            text: "Added to Cart!",
            duration: 3000,
            gravity: "bottom", position: "center", 
            style: { background: "#22c55e", borderRadius: "8px", fontWeight: "bold" }
        }).showToast();
    }

    function buyNow() {
        if(!checkFashionSelection()) return;
        addToCart();
        window.location.href = 'cart.html';
    }

    // 🌟 NEW RESERVE PICKUP FUNCTION 🌟
    function reservePickup() {
        if(!checkFashionSelection()) return;
        // Functionality to be added later (e.g. adding to a 'reservations' array in local storage or direct API call)
        Toastify({
            text: "Store Pickup reserved! The seller will keep this ready.",
            duration: 4000,
            gravity: "bottom", position: "center", 
            style: { background: "#0f172a", borderRadius: "8px", fontWeight: "bold" }
        }).showToast();
    }

    function updateGlobalCartCount() {
        let cart = JSON.parse(localStorage.getItem('cart') || "[]");
        let count = cart.reduce((acc, item) => acc + item.quantity, 0);
        const badge = document.getElementById('cart-count-badge');
        if(badge) badge.innerText = count;
    }

    function showError() {
        document.getElementById('loader').classList.add('hidden');
        document.getElementById('error-screen').classList.remove('hidden');
    }

    initPage();
    </script>
</body>
