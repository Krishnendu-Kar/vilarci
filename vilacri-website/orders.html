<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - Vilarci</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        main { margin-top: 60px; }
        .flipkart-card:active { background-color: #f8fafc; }
    </style>
</head>
<body>
    <div id="vilarci-header"></div>

    <main class="max-w-3xl mx-auto md:py-6">
        <div class="bg-white md:rounded-t-xl border-b border-slate-200 p-4 flex items-center justify-between sticky top-[56px] z-10">
            <div class="flex items-center gap-3">
                <i data-lucide="arrow-left" class="w-5 h-5 text-slate-600 cursor-pointer" onclick="window.history.back()"></i>
                <h1 class="text-lg font-semibold text-slate-900">My Orders</h1>
            </div>
            <div class="flex items-center gap-2 text-sm font-medium text-slate-600">
                <i data-lucide="filter" class="w-4 h-4"></i> Filters
            </div>
        </div>

        <div id="orders-container" class="bg-white md:rounded-b-xl shadow-sm min-h-screen md:min-h-0">
            <div class="text-center py-20"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-red-600 mx-auto"></div></div>
        </div>
    </main>

    <script src="header.js"></script>
    <script>
        const sb = window.supabaseClient;
        let sessionUser = null;

        async function initOrders() {
            lucide.createIcons();
            const { data: { session } } = await sb.auth.getSession();
            if (!session) { window.location.href = "user_login.html?redirect=orders.html"; return; }
            sessionUser = session.user;
            fetchOrders();
        }

        async function fetchOrders() {
            try {
                const { data: orders, error } = await sb.from('orders')
                    .select(`
                        id, created_at, 
                        order_items ( id, status, products ( name, images ) )
                    `)
                    .eq('user_id', sessionUser.id)
                    .order('created_at', { ascending: false });

                if (error) throw error;
                renderOrders(orders || []);
            } catch (err) {
                document.getElementById('orders-container').innerHTML = `<div class="p-8 text-center text-red-500">Failed to load orders.</div>`;
            }
        }

        function renderOrders(orders) {
            const container = document.getElementById('orders-container');
            
            if (orders.length === 0) {
                container.innerHTML = `<div class="p-12 text-center text-slate-500">No orders found.</div>`;
                return;
            }

            let html = "";
            orders.forEach(order => {
                const dateObj = new Date(order.created_at);
                const formattedDate = dateObj.toLocaleDateString('en-IN', { month: 'short', day: 'numeric', year: 'numeric' });
                
                // Group items visually like Flipkart
                const itemCount = order.order_items.length;
                const firstItem = order.order_items[0];
                if(!firstItem) return;

                const product = firstItem.products || {};
                let imgUrl = 'placeholder.jpg';
                try {
                    let parsed = product.images;
                    if (typeof parsed === 'string') parsed = JSON.parse(parsed);
                    if (Array.isArray(parsed) && parsed.length > 0) imgUrl = parsed[0];
                } catch(e) {}

                // Determine overall status text
                const allDelivered = order.order_items.every(i => i.status === 'Delivered');
                const statusText = allDelivered ? `Delivered on ${formattedDate}` : `Placed on ${formattedDate}`;
                const statusColor = allDelivered ? 'text-slate-800' : 'text-green-600';

                let titleText = product.name || 'Item';
                if (itemCount > 1) {
                    titleText = `Vilarci Package (${itemCount} items)`;
                }

                html += `
                    <div class="flipkart-card border-b border-slate-200 p-4 flex items-center gap-4 cursor-pointer transition-colors" onclick="window.location.href='order_tracking.html?order_id=${order.id}'">
                        <div class="w-16 h-16 flex-shrink-0 relative">
                            <img src="${imgUrl}" class="w-full h-full object-contain mix-blend-multiply">
                            ${itemCount > 1 ? `<div class="absolute -bottom-2 -right-2 bg-white border border-slate-200 text-xs font-bold text-slate-600 w-7 h-7 rounded-full flex items-center justify-center">+${itemCount - 1}</div>` : ''}
                        </div>
                        
                        <div class="flex-grow min-w-0 pr-4">
                            <h3 class="text-sm font-semibold ${statusColor} mb-1">${statusText}</h3>
                            <p class="text-sm text-slate-600 truncate">${titleText}</p>
                            ${itemCount === 1 ? `<div class="flex gap-1 mt-2 text-slate-200"><i class="fa-solid fa-star text-xs"></i><i class="fa-solid fa-star text-xs"></i><i class="fa-solid fa-star text-xs"></i></div>` : ''}
                        </div>

                        <i data-lucide="chevron-right" class="w-5 h-5 text-slate-400 flex-shrink-0"></i>
                    </div>
                `;
            });

            container.innerHTML = html;
            if (window.lucide) window.lucide.createIcons();
        }

        document.addEventListener('DOMContentLoaded', initOrders);
    </script>
</body>
</html>
