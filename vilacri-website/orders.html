<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - Vilarci</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        main { margin-top: 80px; }
        .order-card:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body>

    <div id="vilarci-header"></div>

    <main class="max-w-4xl mx-auto px-4 py-6">
        <div class="flex items-center justify-between mb-8">
            <h1 class="text-3xl font-extrabold text-slate-900">My Orders</h1>
            <button onclick="window.location.href='index.html'" class="text-sm font-bold text-red-600 bg-red-50 px-4 py-2 rounded-lg hover:bg-red-100 transition">Continue Shopping</button>
        </div>

        <div id="orders-container" class="space-y-6">
            <div class="text-center py-20 bg-white rounded-2xl border border-slate-200 shadow-sm">
                <div class="animate-spin rounded-full h-10 w-10 border-b-4 border-red-600 mx-auto"></div>
                <p class="text-slate-500 mt-4 font-bold">Fetching your secure order history...</p>
            </div>
        </div>
    </main>

    <script src="header.js"></script>
    <script>
        const sb = window.supabaseClient;
        let sessionUser = null;

        async function initOrders() {
            lucide.createIcons();
            const { data: { session } } = await sb.auth.getSession();
            
            if (!session) {
                window.location.href = "user_login.html?redirect=orders.html";
                return;
            }
            sessionUser = session.user;
            
            fetchOrders();
        }

        async function fetchOrders() {
            try {
                // Securely fetch ONLY the logged-in user's orders, sorted newest first
                const { data: orders, error } = await sb.from('orders')
                    .select(`
                        id, created_at, grand_total, payment_method, payment_status, cart_type,
                        order_items (
                            id, quantity, status, price_at_purchase,
                            products ( name, images )
                        )
                    `)
                    .eq('user_id', sessionUser.id)
                    .order('created_at', { ascending: false });

                if (error) throw error;
                
                renderOrders(orders || []);

            } catch (err) {
                console.error("Error fetching orders:", err);
                document.getElementById('orders-container').innerHTML = `
                    <div class="p-6 bg-red-50 text-red-600 font-bold rounded-xl text-center">
                        Failed to load orders. Please try again.
                    </div>`;
            }
        }

        function renderOrders(orders) {
            const container = document.getElementById('orders-container');
            
            if (orders.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-20 bg-white rounded-2xl border border-slate-200 shadow-sm">
                        <div class="w-20 h-20 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-4">
                            <i data-lucide="package-x" class="w-10 h-10 text-slate-300"></i>
                        </div>
                        <h2 class="text-xl font-extrabold text-slate-900 mb-2">No orders found</h2>
                        <p class="text-slate-500 mb-6">Looks like you haven't placed any orders yet.</p>
                        <button onclick="window.location.href='index.html'" class="px-6 py-2 bg-slate-900 text-white font-bold rounded-lg hover:bg-slate-800 transition">Start Browsing</button>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            let html = "";
            orders.forEach(order => {
                const dateObj = new Date(order.created_at);
                const formattedDate = dateObj.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
                
                // Determine Global Order Status based on items
                const allDelivered = order.order_items.length > 0 && order.order_items.every(i => i.status === 'Delivered');
                const anyCancelled = order.order_items.some(i => i.status === 'Cancelled');
                
                let statusBadge = `<span class="px-2.5 py-1 bg-blue-100 text-blue-700 rounded-md text-xs font-bold uppercase tracking-wider">In Progress</span>`;
                if (allDelivered) statusBadge = `<span class="px-2.5 py-1 bg-green-100 text-green-700 rounded-md text-xs font-bold uppercase tracking-wider">Completed</span>`;
                if (anyCancelled && order.order_items.every(i => i.status === 'Cancelled')) statusBadge = `<span class="px-2.5 py-1 bg-red-100 text-red-700 rounded-md text-xs font-bold uppercase tracking-wider">Cancelled</span>`;

                const typeIcon = order.cart_type === 'rapid' ? '<i data-lucide="zap" class="w-4 h-4 text-amber-500 inline"></i> Rapid' : 
                                 order.cart_type === 'pickup' ? '<i data-lucide="store" class="w-4 h-4 text-indigo-500 inline"></i> Pick Up' : 
                                 '<i data-lucide="truck" class="w-4 h-4 text-slate-500 inline"></i> Standard';

                // Render miniature preview of items inside the order
                let itemsHtml = "";
                const displayLimit = 3;
                
                order.order_items.slice(0, displayLimit).forEach(item => {
                    const product = item.products || {};
                    let imgUrl = 'placeholder.jpg';
                    try {
                        let parsed = product.images;
                        if (typeof parsed === 'string') parsed = JSON.parse(parsed);
                        if (Array.isArray(parsed) && parsed.length > 0) imgUrl = parsed[0];
                    } catch(e) {}

                    itemsHtml += `
                        <div class="flex items-center gap-3 py-2 border-b border-slate-50 last:border-0">
                            <img src="${imgUrl}" class="w-12 h-12 rounded bg-slate-50 border border-slate-100 p-1 object-contain mix-blend-multiply flex-shrink-0">
                            <div class="flex-grow min-w-0">
                                <p class="text-sm font-bold text-slate-800 truncate">${product.name || 'Item'}</p>
                                <p class="text-xs text-slate-500">Qty: ${item.quantity}</p>
                            </div>
                        </div>
                    `;
                });

                if (order.order_items.length > displayLimit) {
                    itemsHtml += `<div class="text-xs text-slate-400 font-bold text-center mt-2 pt-2 border-t border-slate-100">+ ${order.order_items.length - displayLimit} more items</div>`;
                }

                html += `
                    <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden order-card transition-all duration-300">
                        <div class="bg-slate-50 px-5 py-4 border-b border-slate-200 flex flex-wrap gap-4 items-center justify-between">
                            <div>
                                <div class="flex items-center gap-2 mb-1">
                                    <span class="text-sm font-extrabold text-slate-900">${order.id}</span>
                                    ${statusBadge}
                                </div>
                                <div class="text-xs font-semibold text-slate-500 flex items-center gap-3">
                                    <span>Placed on ${formattedDate}</span>
                                    <span class="flex items-center gap-1">${typeIcon}</span>
                                </div>
                            </div>
                            <div class="text-right">
                                <span class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-0.5">Total Amount</span>
                                <span class="text-lg font-black text-slate-900">₹${order.grand_total}</span>
                            </div>
                        </div>
                        
                        <div class="p-5 flex flex-col md:flex-row gap-6">
                            <div class="flex-grow">
                                ${itemsHtml}
                            </div>
                            
                            <div class="md:border-l md:border-slate-100 md:pl-6 flex flex-col justify-center gap-3 min-w-[180px]">
                                <button onclick="window.location.href='order-success.html?order_id=${order.id}'" class="w-full py-2.5 bg-slate-900 text-white text-sm font-bold rounded-lg hover:bg-slate-800 transition shadow-md shadow-slate-200">
                                    Track / View Details
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
            if (window.lucide) window.lucide.createIcons();
        }

        document.addEventListener('DOMContentLoaded', initOrders);
    </script>
</body>
</html>
