<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Vilarci</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        main { margin-top: 80px; } 
    </style>
</head>
<body>

    <div id="vilarci-header"></div>

    <main class="max-w-4xl mx-auto px-4 py-8">
        <h1 class="text-3xl font-extrabold text-slate-900 mb-8">My Account</h1>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            
            <div class="md:col-span-1 space-y-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 relative">
                    <button onclick="openProfileEditModal()" class="absolute top-6 right-6 text-sm font-bold text-indigo-600 hover:text-indigo-800 bg-indigo-50 px-3 py-1.5 rounded-lg transition flex items-center gap-1.5">
                        <i data-lucide="edit-3" class="w-4 h-4"></i> Edit
                    </button>

                    <div class="w-16 h-16 bg-red-100 text-red-600 rounded-full flex items-center justify-center text-2xl font-bold mb-4" id="user-initial">V</div>
                    <h2 class="text-xl font-bold text-slate-900 pr-16" id="user-fullname">Loading...</h2>
                    <p class="text-sm text-slate-500 mb-4" id="user-email">...</p>
                    
                    <div class="space-y-3 pt-4 border-t border-slate-100">
                        <div class="flex items-center gap-3 text-slate-600 text-sm">
                            <i data-lucide="phone" class="w-4 h-4"></i>
                            <span id="user-phone">...</span>
                        </div>
                        <div class="flex items-center gap-3 text-slate-600 text-sm">
                            <i data-lucide="user" class="w-4 h-4"></i>
                            <span id="user-gender" class="capitalize">...</span>
                        </div>
                        <div class="flex items-center gap-3 text-slate-600 text-sm">
                            <i data-lucide="calendar" class="w-4 h-4"></i>
                            <span id="user-dob">...</span>
                        </div>
                    </div>

                    <button onclick="logout()" class="w-full mt-6 py-2.5 px-4 border-2 border-red-100 text-red-600 rounded-xl hover:bg-red-50 hover:border-red-200 font-bold transition flex justify-center items-center gap-2">
                        <i data-lucide="log-out" class="w-4 h-4"></i> Sign Out
                    </button>
                </div>
            </div>

            <div class="md:col-span-2">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-lg font-bold text-slate-900 flex items-center gap-2">
                            <i data-lucide="map-pin" class="w-5 h-5 text-red-500"></i> Saved Addresses
                        </h3>
                        <button onclick="openAddressForm()" class="text-sm font-bold text-red-600 hover:text-red-700 bg-red-50 px-3 py-1.5 rounded-lg transition">
                            + Add New
                        </button>
                    </div>

                    <div id="address-list" class="space-y-4">
                        <p class="text-slate-500 text-sm animate-pulse">Loading addresses...</p>
                    </div>

                    <div id="address-form-container" class="hidden mt-6 bg-slate-50 p-4 sm:p-6 rounded-xl border border-slate-200 shadow-inner">
                        <h4 id="addr-form-title" class="font-bold text-slate-800 mb-4 border-b border-slate-200 pb-2">Add a new delivery address</h4>
                        
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4">
                            <div>
                                <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Full Name</label>
                                <input type="text" id="addr-name" class="w-full p-2.5 border border-slate-300 rounded-lg focus:outline-none focus:border-red-500 font-medium text-slate-800">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Mobile Number</label>
                                <input type="tel" id="addr-mobile" class="w-full p-2.5 border border-slate-300 rounded-lg focus:outline-none focus:border-red-500 font-medium text-slate-800" maxlength="10">
                            </div>
                        </div>

                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4 bg-white p-3 rounded-lg border border-slate-200">
                            <div>
                                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">State & District</label>
                                <div class="w-full p-2 border border-slate-100 rounded bg-slate-50 text-slate-500 text-sm font-medium cursor-not-allowed">
                                    West Bengal • Purba Medinipur
                                </div>
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Main Zone</label>
                                <div class="w-full p-2 border border-slate-100 rounded bg-slate-50 text-slate-500 text-sm font-medium cursor-not-allowed">
                                    Tamluk
                                </div>
                            </div>
                            <div class="sm:col-span-2">
                                <label class="block text-xs font-bold text-slate-700 uppercase mb-1">Select Delivery Sub-Zone *</label>
                                <select id="addr-subzone" class="w-full p-2.5 border-2 border-slate-300 rounded-lg focus:outline-none focus:border-red-500 bg-white font-bold text-slate-800 cursor-pointer">
                                    <option value="" disabled selected>Loading local areas...</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-1">House No, Street, Landmark *</label>
                            <textarea id="addr-full" rows="2" class="w-full p-2.5 border border-slate-300 rounded-lg focus:outline-none focus:border-red-500 font-medium text-slate-800" placeholder="e.g., Near Hospital More..."></textarea>
                        </div>
                        
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4">
                            <div>
                                <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Pincode *</label>
                                <input type="number" id="addr-pin" class="w-full p-2.5 border border-slate-300 rounded-lg focus:outline-none focus:border-red-500 font-medium text-slate-800" maxlength="6">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Address Type</label>
                                <select id="addr-type" class="w-full p-2.5 border border-slate-300 rounded-lg focus:outline-none focus:border-red-500 bg-white font-bold text-slate-800 cursor-pointer">
                                    <option value="Home">Home</option>
                                    <option value="Office">Office</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                        </div>
                        <div class="flex gap-3 mt-6">
                            <button onclick="closeAddressForm()" class="flex-1 py-2.5 bg-white border border-slate-300 text-slate-700 rounded-lg font-bold hover:bg-slate-50 transition">Cancel</button>
                            <button onclick="saveAddress()" id="btn-save-addr" class="flex-1 py-2.5 bg-red-600 text-white rounded-lg font-bold hover:bg-red-700 transition shadow-md shadow-red-200">Save Address</button>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <div id="profile-edit-modal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[100] hidden items-center justify-center p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-white w-full max-w-xl rounded-2xl shadow-2xl flex flex-col transform scale-95 transition-transform duration-300" id="profile-modal-panel">
            
            <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50 rounded-t-2xl">
                <h2 class="text-lg font-extrabold text-slate-800 flex items-center gap-2">
                    <i data-lucide="user-cog" class="w-5 h-5 text-indigo-600"></i> Edit Personal Details
                </h2>
                <button onclick="closeProfileEditModal()" class="p-2 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-xl transition">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>

            <div class="p-6 space-y-4">
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[11px] font-bold text-slate-500 uppercase mb-1">First Name</label>
                        <input type="text" id="edit-fn" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2 font-semibold text-slate-800 focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-slate-500 uppercase mb-1">Middle Name (Optional)</label>
                        <input type="text" id="edit-mn" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2 font-semibold text-slate-800 focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                    <div class="sm:col-span-2">
                        <label class="block text-[11px] font-bold text-slate-500 uppercase mb-1">Last Name</label>
                        <input type="text" id="edit-ln" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2 font-semibold text-slate-800 focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 pt-2 border-t border-slate-100">
                    <div>
                        <label class="block text-[11px] font-bold text-slate-500 uppercase mb-1">WhatsApp Number</label>
                        <input type="tel" id="edit-wa" maxlength="10" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2 font-semibold text-slate-800 focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-slate-500 uppercase mb-1">Date of Birth</label>
                        <input type="date" id="edit-dob" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2 font-semibold text-slate-800 focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-slate-500 uppercase mb-1">Gender</label>
                        <select id="edit-gender" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2 font-semibold text-slate-800 focus:ring-2 focus:ring-indigo-500 outline-none cursor-pointer">
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-slate-500 uppercase mb-1">Email Address</label>
                        <input type="email" id="edit-email" disabled class="w-full bg-slate-100 border border-slate-200 rounded-xl px-4 py-2 font-semibold text-slate-400 cursor-not-allowed" title="Email cannot be changed here">
                    </div>
                </div>
            </div>

            <div class="px-6 py-4 border-t border-slate-100 flex justify-end gap-3 bg-slate-50 rounded-b-2xl">
                <button onclick="closeProfileEditModal()" class="px-5 py-2 rounded-xl font-bold text-slate-600 bg-white border border-slate-300 hover:bg-slate-100 transition">Cancel</button>
                <button onclick="saveProfileData()" id="btn-save-profile" class="px-6 py-2 rounded-xl font-bold text-white bg-indigo-600 hover:bg-indigo-700 shadow-md transition flex items-center gap-2">
                    Save Details
                </button>
            </div>
        </div>
    </div>

    <script src="header.js"></script>
    <script>
        const sb = window.supabaseClient;
        lucide.createIcons();
        
        let sessionUser = null;
        let subZonesLoaded = false;
        
        // State variables
        let userDataCache = {};
        let userAddresses = [];
        let editingAddressId = null;

        // ==========================================
        // 1. PROFILE LOGIC
        // ==========================================
        async function initProfile() {
            const { data: { session }, error } = await sb.auth.getSession();
            
            if (!session) {
                window.location.href = "user_login.html";
                return;
            }
            sessionUser = session.user;

            const { data: userData } = await sb.from('users').select('*').eq('id', sessionUser.id).single();
            
            if (userData) {
                userDataCache = userData;
                updateProfileUI();
            }

            fetchAddresses();
        }

        function updateProfileUI() {
            const fullName = `${userDataCache.first_name || ''} ${userDataCache.middle_name || ''} ${userDataCache.last_name || ''}`.replace(/\s+/g, ' ').trim();
            document.getElementById('user-fullname').innerText = fullName || 'Vilarci User';
            document.getElementById('user-initial').innerText = (userDataCache.first_name || 'V').charAt(0).toUpperCase();
            document.getElementById('user-email').innerText = userDataCache.email || 'No email provided';
            document.getElementById('user-phone').innerText = userDataCache.whatsapp_number || 'N/A';
            document.getElementById('user-gender').innerText = userDataCache.gender || 'N/A';
            
            if (userDataCache.dob) {
                const d = new Date(userDataCache.dob);
                document.getElementById('user-dob').innerText = d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
            } else {
                document.getElementById('user-dob').innerText = 'N/A';
            }
        }

        // Profile Edit Modal Logic
        function openProfileEditModal() {
            document.getElementById('edit-fn').value = userDataCache.first_name || '';
            document.getElementById('edit-mn').value = userDataCache.middle_name || '';
            document.getElementById('edit-ln').value = userDataCache.last_name || '';
            document.getElementById('edit-wa').value = userDataCache.whatsapp_number || '';
            document.getElementById('edit-dob').value = userDataCache.dob || '';
            document.getElementById('edit-gender').value = userDataCache.gender || 'male';
            document.getElementById('edit-email').value = userDataCache.email || '';

            const modal = document.getElementById('profile-edit-modal');
            const panel = document.getElementById('profile-modal-panel');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            setTimeout(() => { modal.classList.remove('opacity-0'); panel.classList.remove('scale-95'); }, 10);
            document.body.style.overflow = 'hidden';
        }

        function closeProfileEditModal() {
            const modal = document.getElementById('profile-edit-modal');
            const panel = document.getElementById('profile-modal-panel');
            modal.classList.add('opacity-0');
            panel.classList.add('scale-95');
            setTimeout(() => { modal.classList.add('hidden'); modal.classList.remove('flex'); document.body.style.overflow = 'auto'; }, 300);
        }

        async function saveProfileData() {
            const btn = document.getElementById('btn-save-profile');
            btn.innerHTML = `<div class="animate-spin h-4 w-4 border-2 border-white border-t-transparent rounded-full"></div> Saving...`;
            btn.disabled = true;

            const updates = {
                first_name: document.getElementById('edit-fn').value.trim() || null,
                middle_name: document.getElementById('edit-mn').value.trim() || null,
                last_name: document.getElementById('edit-ln').value.trim() || null,
                whatsapp_number: document.getElementById('edit-wa').value.trim() || null,
                dob: document.getElementById('edit-dob').value || null,
                gender: document.getElementById('edit-gender').value || null
            };

            try {
                const { error } = await sb.from('users').update(updates).eq('id', sessionUser.id);
                if (error) throw error;
                
                // Update local cache and UI
                userDataCache = { ...userDataCache, ...updates };
                updateProfileUI();
                closeProfileEditModal();
                Toastify({ text: "Profile Details Updated! ✅", duration: 3000, style: { background: "#22c55e", borderRadius: "8px" } }).showToast();

            } catch (err) {
                Toastify({ text: "Error saving profile.", duration: 3000, style: { background: "#ef4444" } }).showToast();
                console.error(err);
            } finally {
                btn.innerHTML = `Save Details`;
                btn.disabled = false;
            }
        }

        // ==========================================
        // 2. ADDRESS LOGIC
        // ==========================================
        async function fetchAddresses() {
            const listEl = document.getElementById('address-list');
            
            const { data, error } = await sb.from('user_addresses')
                .select(`*, states (name), districts (name), main_zones (name), sub_zones (name)`)
                .eq('user_id', sessionUser.id)
                .order('created_at', { ascending: false });

            if (error || !data || data.length === 0) {
                userAddresses = [];
                listEl.innerHTML = `<div class="text-center py-6 border-2 border-dashed border-slate-200 rounded-xl"><p class="text-slate-500 text-sm">No addresses saved yet.</p></div>`;
                return;
            }

            userAddresses = data; // Cache globally for editing

            listEl.innerHTML = data.map(addr => {
                const subName = addr.sub_zones ? addr.sub_zones.name : 'Unknown Area';
                const mainName = addr.main_zones ? addr.main_zones.name : '';
                const distName = addr.districts ? addr.districts.name : '';
                const zoneText = `${subName}, ${mainName}, ${distName}`;

                return `
                <div class="p-4 border border-slate-200 rounded-xl hover:border-red-300 transition group relative bg-white shadow-sm">
                    <div class="flex justify-between items-start mb-2">
                        <div class="flex items-center gap-2">
                            <span class="bg-slate-100 text-slate-600 text-[10px] font-bold px-2 py-1 rounded uppercase tracking-wider">${addr.address_type}</span>
                            <span class="font-bold text-slate-800">${addr.full_name}</span>
                        </div>
                        
                        <div class="flex gap-1 opacity-100 sm:opacity-0 group-hover:opacity-100 transition duration-300">
                            <button onclick="editAddress('${addr.id}')" class="p-1.5 text-slate-400 hover:bg-indigo-50 hover:text-indigo-600 rounded-lg transition" title="Edit Address">
                                <i data-lucide="edit-2" class="w-4 h-4"></i>
                            </button>
                            <button onclick="deleteAddress('${addr.id}')" class="p-1.5 text-slate-400 hover:bg-red-50 hover:text-red-600 rounded-lg transition" title="Delete Address">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>
                    <p class="text-sm text-slate-600 mb-1 leading-relaxed">${addr.full_address}</p>
                    
                    <p class="text-xs font-bold text-indigo-600 bg-indigo-50 inline-block px-2 py-1 rounded mb-2">
                        <i data-lucide="map" class="w-3 h-3 inline pb-0.5"></i> ${zoneText}
                    </p>
                    
                    <p class="text-xs text-slate-500 font-medium">Pincode: ${addr.pincode} &nbsp;•&nbsp; Phone: ${addr.mobile}</p>
                </div>
            `}).join('');
            
            lucide.createIcons();
        }

        async function loadSubZones(preselectId = null) {
            const selectEl = document.getElementById('addr-subzone');
            
            if (!subZonesLoaded) {
                const { data, error } = await sb.from('sub_zones').select('id, name').eq('main_zone_id', 1).order('name');
                if (data) {
                    selectEl.innerHTML = '<option value="" disabled selected>-- Choose Area in Tamluk --</option>';
                    data.forEach(z => { selectEl.innerHTML += `<option value="${z.id}">${z.name}</option>`; });
                    subZonesLoaded = true;
                }
            }
            if (preselectId) selectEl.value = preselectId;
        }

        function openAddressForm() {
            editingAddressId = null;
            document.getElementById('addr-form-title').innerText = "Add a new delivery address";
            document.getElementById('btn-save-addr').innerText = "Save Address";
            document.querySelectorAll('#address-form-container input, #address-form-container textarea').forEach(el => el.value = '');
            
            // Default fills
            document.getElementById('addr-name').value = `${userDataCache.first_name || ''} ${userDataCache.last_name || ''}`.trim();
            document.getElementById('addr-mobile').value = userDataCache.whatsapp_number || '';
            document.getElementById('addr-type').value = 'Home';

            document.getElementById('address-form-container').classList.remove('hidden');
            loadSubZones();
        }

        async function editAddress(id) {
            const addr = userAddresses.find(a => a.id === id);
            if(!addr) return;
            
            editingAddressId = id;
            document.getElementById('addr-form-title').innerText = "Edit Address Details";
            document.getElementById('btn-save-addr').innerText = "Update Address";
            
            document.getElementById('addr-name').value = addr.full_name;
            document.getElementById('addr-mobile').value = addr.mobile;
            document.getElementById('addr-full').value = addr.full_address;
            document.getElementById('addr-pin').value = addr.pincode;
            document.getElementById('addr-type').value = addr.address_type;

            document.getElementById('address-form-container').classList.remove('hidden');
            await loadSubZones(addr.sub_zone_id);
            
            // Scroll to form
            document.getElementById('address-form-container').scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function closeAddressForm() {
            document.getElementById('address-form-container').classList.add('hidden');
            editingAddressId = null;
        }

        async function saveAddress() {
            const btn = document.getElementById('btn-save-addr');
            const name = document.getElementById('addr-name').value.trim();
            const mobile = document.getElementById('addr-mobile').value.trim();
            const fullAddr = document.getElementById('addr-full').value.trim();
            const pin = document.getElementById('addr-pin').value.trim();
            const type = document.getElementById('addr-type').value;
            const subZoneId = document.getElementById('addr-subzone').value;

            if(!name || !mobile || !fullAddr || !pin || !subZoneId) {
                Toastify({ text: "Please fill all required fields.", duration: 3000, style: { background: "#ef4444" } }).showToast();
                return;
            }

            btn.disabled = true;
            btn.innerHTML = `<div class="animate-spin h-4 w-4 border-2 border-white border-t-transparent rounded-full inline-block align-middle"></div> Saving...`;

            const payload = {
                user_id: sessionUser.id,
                full_name: name,
                mobile: mobile,
                full_address: fullAddr,
                pincode: pin,
                address_type: type,
                state_id: 1, 
                district_id: 1, 
                main_zone_id: 1, 
                sub_zone_id: parseInt(subZoneId)
            };

            let error;
            if (editingAddressId) {
                const res = await sb.from('user_addresses').update(payload).eq('id', editingAddressId);
                error = res.error;
            } else {
                const res = await sb.from('user_addresses').insert([payload]);
                error = res.error;
            }

            btn.disabled = false;
            btn.innerText = editingAddressId ? "Update Address" : "Save Address";

            if (error) {
                Toastify({ text: "Failed to save address.", duration: 3000, style: { background: "#ef4444" } }).showToast();
            } else {
                Toastify({ text: editingAddressId ? "Address Updated! ✅" : "Address Saved! ✅", duration: 3000, style: { background: "#22c55e", borderRadius: "8px" } }).showToast();
                closeAddressForm();
                fetchAddresses();
            }
        }

        async function deleteAddress(id) {
            if(!confirm("Are you sure you want to delete this address?")) return;
            const { error } = await sb.from('user_addresses').delete().eq('id', id);
            if(!error) {
                Toastify({ text: "Address Deleted.", duration: 3000, style: { background: "#64748b", borderRadius: "8px" } }).showToast();
                if(editingAddressId === id) closeAddressForm();
                fetchAddresses();
            }
        }

        async function logout() {
            await sb.auth.signOut();
            window.location.href = "index.html";
        }

        document.addEventListener('DOMContentLoaded', initProfile);
    </script>
</body>
</html>
