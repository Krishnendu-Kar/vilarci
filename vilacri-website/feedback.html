<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback - Vilarci</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="vilarci-bridge.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://unpkg.com/lucide@latest"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Inter', sans-serif; 
        }
        
        /* 1. ABSOLUTE SCROLLBAR REMOVAL FOR ALL BROWSERS */
        * {
            -ms-overflow-style: none !important;  /* IE and Edge */
            scrollbar-width: none !important;  /* Firefox */
        }
        ::-webkit-scrollbar {
            display: none !important; /* Chrome, Safari, Opera */
            width: 0px !important;
            height: 0px !important;
        }

        /* 2. THE SCROLLBAR PUSHER: Makes iframe wider to hide its internal scrollbar off-screen */
        .push-scrollbar {
            width: calc(100% + 40px);
            padding-right: 15px; /* Keeps the form perfectly centered */
        }

        /* 3. Smooth animated gradient for the top border */
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .animated-gradient {
            background: linear-gradient(270deg, #e43e3e, #ffb300, #4f46e5, #e43e3e);
            background-size: 300% 300%;
            animation: gradientMove 4s ease infinite;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">

    <div id="vilarci-header"></div>

    <main class="flex-grow w-full max-w-3xl mx-auto px-4 py-8 sm:py-10">
        
        <div class="text-center mb-6">
            <h1 class="text-2xl sm:text-3xl font-extrabold text-slate-900 tracking-tight mb-2">We Value Your Feedback</h1>
            <p class="text-slate-500 text-sm sm:text-base font-medium">
                Help us make Vilarci better for you.
            </p>
        </div>

        <div class="relative bg-white rounded-2xl shadow-2xl shadow-slate-200/50 border border-slate-200 overflow-hidden">
            
            <div class="animated-gradient h-2 w-full"></div>

            <div class="w-full h-[75vh] max-h-[800px] overflow-y-auto overflow-x-hidden relative">
                
                <div class="push-scrollbar">
                    <iframe 
                        src="https://docs.google.com/forms/d/e/1FAIpQLSdxB2AVCDGoklNXjF1yfZ3S83IEd3Q_RWhYfCLcx6NyXHaLnw/viewform?embedded=true" 
                        height="2221" 
                        frameborder="0" 
                        marginheight="0" 
                        marginwidth="0"
                        title="Vilarci Feedback Form"
                        class="w-full bg-transparent">
                        Loading…
                    </iframe>
                </div>

            </div>

            <div class="absolute bottom-0 left-0 w-full h-[85px] bg-white z-20 flex justify-center items-center pb-2 border-t border-slate-50">
                
                <div class="flex items-center gap-2 text-slate-600 text-xs font-bold bg-slate-50 px-6 py-2.5 rounded-full shadow-sm border border-slate-200 cursor-default">
                    <i data-lucide="shield-check" class="w-4 h-4 text-green-500"></i>
                    Secured with Vilarci
                </div>
                
            </div>

        </div>
    </main>

    <script src="config.js"></script>
    <script src="header.js"></script>
    
    <script>
        // Initialize Icons
        document.addEventListener('DOMContentLoaded', () => {
            if (window.lucide) window.lucide.createIcons();
        });
    </script>
</body>
</html>
