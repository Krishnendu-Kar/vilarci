<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cart - Vilarci</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        main { margin-top: 80px; } /* Space for Vilarci header */
        
        .tab-btn { transition: all 0.3s ease; }
        .tab-btn.active { 
            color: #e43e3e; 
            border-bottom: 3px solid #e43e3e; 
            font-weight: 800;
            background: #fffafa;
        }
        .tab-btn.inactive {
            color: #64748b;
            border-bottom: 3px solid transparent;
            font-weight: 600;
        }
        .tab-btn.inactive:hover { background: #f1f5f9; color: #334155; }
    </style>
</head>
<body>

    <div id="vilarci-header"></div>

    <main class="max-w-6xl mx-auto px-4 py-6">
        <h1 class="text-3xl font-extrabold text-slate-900 mb-6">Shopping Cart</h1>

        <div class="bg-white rounded-t-xl border-b border-slate-200 flex overflow-x-auto shadow-sm no-scrollbar">
            <button onclick="switchTab('normal')" id="tab-normal" class="tab-btn active flex-1 py-4 px-6 text-sm sm:text-base whitespace-nowrap flex items-center justify-center gap-2">
                <i data-lucide="truck" class="w-5 h-5"></i> Normal Delivery
            </button>
            <button onclick="switchTab('rapid')" id="tab-rapid" class="tab-btn inactive flex-1 py-4 px-6 text-sm sm:text-base whitespace-nowrap flex items-center justify-center gap-2 border-l border-slate-100">
                <i data-lucide="zap" class="w-5 h-5 text-amber-500"></i> Rapid (30 Min)
            </button>
            <button onclick="switchTab('pickup')" id="tab-pickup" class="tab-btn inactive flex-1 py-4 px-6 text-sm sm:text-base whitespace-nowrap flex items-center justify-center gap-2 border-l border-slate-100">
                <i data-lucide="store" class="w-5 h-5 text-indigo-500"></i> Pick Up
            </button>
            <button onclick="switchTab('service')" id="tab-service" class="tab-btn inactive flex-1 py-4 px-6 text-sm sm:text-base whitespace-nowrap flex items-center justify-center gap-2 border-l border-slate-100">
                <i data-lucide="wrench" class="w-5 h-5 text-pink-500"></i> Services
            </button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mt-6">
            
            <div class="lg:col-span-2 space-y-6" id="cart-container">
                <div class="text-center py-12 bg-white rounded-xl border border-slate-200 shadow-sm">
                    <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-red-600 mx-auto"></div>
                    <p class="text-slate-500 mt-4 font-medium">Loading your items...</p>
                </div>
            </div>

            <div class="lg:col-span-1">
                <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 sticky top-24">
                    <h3 class="text-lg font-bold text-slate-900 border-b border-slate-100 pb-4 mb-4" id="summary-title">Normal Summary</h3>
                    
                    <div class="space-y-3 text-sm text-slate-600 mb-6">
                        <div class="flex justify-between">
                            <span>Item Total</span>
                            <span class="font-bold text-slate-800" id="summ-item-total">₹0.00</span>
                        </div>
                        <div class="flex justify-between" id="summ-delivery-row">
                            <span>Delivery Fee</span>
                            <span class="font-bold text-slate-800" id="summ-delivery-fee">Calculated at checkout</span>
                        </div>
                        <div class="flex justify-between hidden" id="summ-rapid-row">
                            <span class="text-amber-600 flex items-center gap-1"><i data-lucide="zap" class="w-4 h-4"></i> Rapid Fee</span>
                            <span class="font-bold text-amber-600" id="summ-rapid-fee">₹0.00</span>
                        </div>
                    </div>
                    
                    <div class="border-t border-slate-200 pt-4 mb-6">
                        <div class="flex justify-between items-center">
                            <span class="font-bold text-slate-900">Grand Total</span>
                            <span class="text-xl font-extrabold text-red-600" id="summ-grand-total">₹0.00</span>
                        </div>
                        <p class="text-xs text-slate-400 mt-1 text-right" id="summ-tax-note">Inclusive of all taxes</p>
                    </div>

                    <button onclick="proceedToCheckout()" class="w-full py-3.5 bg-red-600 text-white rounded-xl font-bold text-lg hover:bg-red-700 transition shadow-lg shadow-red-200 flex justify-center items-center gap-2">
                        Proceed to Checkout <i data-lucide="arrow-right" class="w-5 h-5"></i>
                    </button>

                    <div id="pickup-info-box" class="hidden mt-4 bg-indigo-50 border border-indigo-100 p-3 rounded-lg flex gap-3 items-start">
                        <i data-lucide="info" class="w-5 h-5 text-indigo-500 flex-shrink-0 mt-0.5"></i>
                        <p class="text-xs text-indigo-700 font-medium leading-relaxed">
                            You can pay directly at the shop using our <strong class="font-bold">COS (Cash on Shop)</strong> method. A secure handover code will be generated for each seller.
                        </p>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <script src="header.js"></script>
    <script>
        const sb = window.supabaseClient;
        let sessionUser = null;
        let currentCartType = 'normal';
        let currentCartData = [];
        // ==========================================
        // SCALABILITY FIX: DEBOUNCE TIMERS
        // ==========================================
        let qtyUpdateTimers = {};
        let pendingDeletes = {};

        async function initCart() {
            lucide.createIcons();
            const { data: { session } } = await sb.auth.getSession();
            
            if (!session) {
                // Force login to view cart
                window.location.href = "user_login.html?redirect=cart.html";
                return;
            }
            sessionUser = session.user;
            
            // Default load
            loadCartItems('normal');
        }

        window.switchTab = function(type) {
            currentCartType = type;
            
            // Update Tab UI
            ['normal', 'rapid', 'pickup', 'service'].forEach(t => {
                const btn = document.getElementById(`tab-${t}`);
                if (t === type) {
                    btn.className = "tab-btn active flex-1 py-4 px-6 text-sm sm:text-base whitespace-nowrap flex items-center justify-center gap-2";
                } else {
                    btn.className = "tab-btn inactive flex-1 py-4 px-6 text-sm sm:text-base whitespace-nowrap flex items-center justify-center gap-2 border-l border-slate-100";
                }
            });

            // Update Summary UI dynamically
            document.getElementById('summary-title').innerText = 
                type === 'normal' ? 'Normal Summary' : 
                type === 'rapid' ? 'Rapid Delivery Summary' : 
                type === 'pickup' ? 'Store Pick Up Summary' : 'Service Booking Summary';
                
            document.getElementById('summ-delivery-row').style.display = (type === 'pickup' || type === 'service') ? 'none' : 'flex';
            document.getElementById('summ-rapid-row').style.display = type === 'rapid' ? 'flex' : 'none';
            document.getElementById('pickup-info-box').style.display = type === 'pickup' ? 'flex' : 'none';

            loadCartItems(type);
        };

        async function loadCartItems(type) {
            const container = document.getElementById('cart-container');
            container.innerHTML = `<div class="text-center py-12"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-red-600 mx-auto"></div></div>`;

            try {
                const { data, error } = await sb.from('cart_items')
                    .select(`
                        id, quantity, cart_type, product_id, service_id, selected_amount,
                        products ( id, name, slug, base_price, images, seller_id, is_rapid_eligible, is_pickup_eligible, shops_public_587 ( store_name, full_address ) ),
                        services ( id, name, slug, price, images, seller_id, shops_public_587 ( store_name, full_address ) )
                    `)
                    .eq('user_id', sessionUser.id)
                    .eq('cart_type', type);

                if (error) throw error;
                currentCartData = data || [];
                renderCart();

            } catch (err) {
                container.innerHTML = `<div class="text-center py-8 text-red-500 font-bold">Failed to load cart: ${err.message}</div>`;
            }
        }

        function renderCart() {
            const container = document.getElementById('cart-container');
            
            if (currentCartData.length === 0) {
                container.innerHTML = `
                    <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-12 text-center">
                        <div class="w-20 h-20 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-4">
                            <i data-lucide="shopping-cart" class="w-10 h-10 text-slate-300"></i>
                        </div>
                        <h3 class="text-xl font-bold text-slate-800 mb-2">Your cart is empty</h3>
                        <p class="text-slate-500 mb-6">Looks like you haven't added anything to this cart yet.</p>
                        <button onclick="window.location.href='index.html'" class="px-6 py-2 bg-red-600 text-white font-bold rounded-lg hover:bg-red-700">Continue Shopping</button>
                    </div>
                `;
                updateSummary();
                lucide.createIcons();
                return;
            }

            // Group items by seller
            const groupedBySeller = {};
            currentCartData.forEach(item => {
                const isService = currentCartType === 'service';
                const itemData = isService ? item.services : item.products;
                
                if(!itemData) return; 
                
                const sellerName = itemData.shops_public_587?.store_name || "Unknown Provider";
                const sellerId = itemData.seller_id || "unknown";

                if (!groupedBySeller[sellerId]) {
                    groupedBySeller[sellerId] = {
                        storeName: sellerName,
                        address: itemData.shops_public_587?.full_address || "",
                        items: [],
                        sellerTotalItems: 0,
                        sellerTotalPrice: 0
                    };
                }
                
                const price = isService ? (parseFloat(itemData.price) || 0) : (parseFloat(itemData.base_price) || 0);
                
                groupedBySeller[sellerId].items.push(item);
                groupedBySeller[sellerId].sellerTotalItems += item.quantity;
                groupedBySeller[sellerId].sellerTotalPrice += (price * item.quantity);
            });

            // Render groups
            let html = "";
            for (const [sellerId, group] of Object.entries(groupedBySeller)) {
                
                const addressBadge = (currentCartType === 'pickup' || currentCartType === 'service') 
                    ? `<p class="text-xs text-slate-500 mt-1 flex items-center gap-1"><i data-lucide="map-pin" class="w-3 h-3"></i> ${group.address}</p>` 
                    : '';

                html += `
                    <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden mb-6">
                        <div class="bg-slate-50 px-5 py-3 border-b border-slate-200 flex items-center justify-between">
                            <div>
                                <span class="text-xs font-bold text-slate-500 uppercase tracking-wider block mb-0.5">Provided By</span>
                                <h3 class="font-bold text-slate-900 text-base">${group.storeName}</h3>
                                ${addressBadge}
                            </div>
                            <div class="text-right">
                                <span class="text-xs font-bold text-slate-500 block mb-0.5">${group.sellerTotalItems} Items</span>
                                <h3 class="font-bold text-slate-900 text-base">₹${group.sellerTotalPrice.toFixed(2)}</h3>
                            </div>
                        </div>
                        <div class="divide-y divide-slate-100">
                `;

                group.items.forEach(item => {
                    const isService = currentCartType === 'service';
                    const itemData = isService ? item.services : item.products;
                    const detailPageUrl = isService ? `service_details.html?slug=${itemData.slug}` : `product_details.html?slug=${itemData.slug}`;
                    
                    let imgUrl = 'placeholder.jpg';
                    if (itemData.images) {
                        try {
                            const parsedImages = typeof itemData.images === 'string' ? JSON.parse(itemData.images) : itemData.images;
                            if (parsedImages.length > 0) imgUrl = parsedImages[0];
                        } catch(e) {}
                    }
                    
                    const price = isService ? (parseFloat(itemData.price) || 0) : (parseFloat(itemData.base_price) || 0);
                    const totalItemPrice = price * item.quantity;
                    
                    const variantBadge = item.selected_amount 
                        ? `<span class="inline-block mt-1 px-2 py-0.5 bg-slate-100 text-slate-600 text-xs font-bold rounded">${item.selected_amount}</span>` 
                        : '';

                    // Eligibility Check & Dropdown for physical products
                    let moveCartHtml = '';
                    if (!isService) {
                        moveCartHtml = `
                            <div class="mt-3">
                                <select onchange="changeItemCartType('${item.id}', this.value)" class="text-xs font-semibold text-slate-600 bg-slate-50 border border-slate-200 rounded p-1.5 outline-none focus:border-red-400 cursor-pointer">
                                    <option value="normal" ${currentCartType === 'normal' ? 'selected' : ''}>Normal Delivery</option>
                                    ${itemData.is_rapid_eligible ? `<option value="rapid" ${currentCartType === 'rapid' ? 'selected' : ''}>Rapid (30 Min)</option>` : ''}
                                    ${itemData.is_pickup_eligible ? `<option value="pickup" ${currentCartType === 'pickup' ? 'selected' : ''}>Store Pickup</option>` : ''}
                                </select>
                            </div>
                        `;
                    }

                    html += `
                        <div class="p-5 flex flex-col sm:flex-row gap-5 items-start sm:items-center relative">
                            <div class="w-24 h-24 flex-shrink-0 bg-slate-50 rounded-lg border border-slate-200 overflow-hidden p-2 cursor-pointer" onclick="window.location.href='${detailPageUrl}'">
                                <img src="${imgUrl}" alt="${itemData.name}" class="w-full h-full object-contain mix-blend-multiply">
                            </div>
                            
                            <div class="flex-grow">
                                <h4 class="font-bold text-slate-800 text-lg mb-1 leading-tight hover:text-red-600 cursor-pointer transition" onclick="window.location.href='${detailPageUrl}'">${itemData.name}</h4>
                                ${variantBadge}
                                <p class="text-red-600 font-extrabold text-lg mt-1">₹${price.toFixed(2)}</p>
                                
                                ${moveCartHtml}
                                
                                <div class="flex items-center gap-4 mt-3">
                                    <div class="flex items-center border border-slate-300 rounded-lg overflow-hidden bg-white">
                                        <button onclick="updateQty('${item.id}', ${item.quantity - 1})" class="px-3 py-1 text-slate-600 hover:bg-slate-100 font-bold transition">-</button>
                                        <div class="px-3 py-1 text-sm font-bold border-x border-slate-300 min-w-[40px] text-center">${item.quantity}</div>
                                        <button onclick="updateQty('${item.id}', ${item.quantity + 1})" class="px-3 py-1 text-slate-600 hover:bg-slate-100 font-bold transition">+</button>
                                    </div>
                                    <button onclick="triggerRemove('${item.id}')" class="text-sm font-bold text-slate-400 hover:text-red-600 flex items-center gap-1 transition">
                                        <i data-lucide="trash-2" class="w-4 h-4"></i> Remove
                                    </button>
                                </div>
                            </div>
                            
                            <div class="hidden sm:block text-right flex-shrink-0 min-w-[100px]">
                                <span class="block text-xs font-bold text-slate-400 mb-1">Total</span>
                                <span class="font-bold text-slate-800 text-lg">₹${totalItemPrice.toFixed(2)}</span>
                            </div>
                        </div>
                    `;
                });

                html += `</div></div>`; 
            }

            container.innerHTML = html;
            updateSummary();
            if(window.lucide) window.lucide.createIcons();
        }

        // ==========================================
        // UPDATED QUANTITY FUNCTION (DEBOUNCED)
        // ==========================================
        window.updateQty = function(cartItemId, newQty) {
            if (newQty < 1) { 
                // We need to pass the item details for the beautiful toast
                const item = currentCartData.find(i => i.id === cartItemId);
                if(item) {
                    const isService = currentCartType === 'service';
                    const itemData = isService ? item.services : item.products;
                    let imgUrl = 'placeholder.jpg';
                    if (itemData.images) {
                        try {
                            const parsed = typeof itemData.images === 'string' ? JSON.parse(itemData.images) : itemData.images;
                            if(parsed.length > 0) imgUrl = parsed[0];
                        } catch(e){}
                    }
                    removeItemWithUndo(cartItemId, itemData.name, imgUrl);
                }
                return; 
            }
            
            // 1. Optimistic UI update (Instant)
            const itemIndex = currentCartData.findIndex(i => i.id === cartItemId);
            if(itemIndex > -1) {
                currentCartData[itemIndex].quantity = newQty;
                renderCart();
            }

            // 2. Debounced Database Update (Protects DB from spam clicks)
            clearTimeout(qtyUpdateTimers[cartItemId]);
            qtyUpdateTimers[cartItemId] = setTimeout(async () => {
                try {
                    await sb.from('cart_items').update({ quantity: newQty }).eq('id', cartItemId);
                    if(typeof window.updateGlobalCartCount === 'function') window.updateGlobalCartCount();
                } catch(err) {
                    console.error("Failed to update qty in DB", err);
                }
            }, 600); // Waits 600ms after the user stops clicking
        };

        // ==========================================
        // NEW: REMOVE WITH UNDO (DELAYED DELETE)
        // ==========================================
        window.removeItemWithUndo = function(cartItemId, itemName, itemImage) {
            // 1. Find and store the item in memory
            const itemToRestore = currentCartData.find(i => i.id === cartItemId);
            if(!itemToRestore) return;

            // 2. Optimistically remove from UI
            currentCartData = currentCartData.filter(i => i.id !== cartItemId);
            renderCart();

            // 3. Store in pending deletes map
            pendingDeletes[cartItemId] = {
                item: itemToRestore,
                timer: setTimeout(async () => {
                    // This runs ONLY if the user doesn't click Undo after 5 seconds
                    await sb.from('cart_items').delete().eq('id', cartItemId);
                    delete pendingDeletes[cartItemId];
                    if(typeof window.updateGlobalCartCount === 'function') window.updateGlobalCartCount();
                }, 5000)
            };

            // 4. Show Sleek Custom Toastify Notification
            Toastify({
                text: `
                    <div style="display: flex; align-items: center; gap: 12px; width: 100%;">
                        <img src="${itemImage}" style="width: 40px; height: 40px; border-radius: 6px; object-fit: cover;">
                        <div style="flex-grow: 1;">
                            <p style="font-weight: 700; color: #0f172a; font-size: 14px; margin:0; line-height: 1.2;">${itemName.length > 20 ? itemName.substring(0,20)+'...' : itemName}</p>
                            <p style="font-size: 12px; color: #64748b; margin:0;">Removed from cart</p>
                        </div>
                        <button onclick="executeUndo('${cartItemId}', this)" style="background: #22c55e; color: white; border: none; padding: 6px 14px; border-radius: 6px; font-weight: 700; cursor: pointer; transition: 0.2s;">Undo</button>
                    </div>
                `,
                escapeMarkup: false, // Allows HTML in the toast
                duration: 5000,
                gravity: "bottom",
                position: "center",
                style: {
                    background: "#ffffff",
                    border: "1px solid #e2e8f0",
                    borderRadius: "12px",
                    boxShadow: "0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1)",
                    padding: "12px 16px",
                    minWidth: "320px",
                    marginBottom: "80px" // Keeps it above mobile navigation
                }
            }).showToast();
        };

        // ==========================================
        // EXECUTE UNDO FUNCTION
        // ==========================================
        window.executeUndo = function(cartItemId, btnElement) {
            if(pendingDeletes[cartItemId]) {
                // Cancel the database deletion
                clearTimeout(pendingDeletes[cartItemId].timer);
                
                // Put item back in UI array
                currentCartData.push(pendingDeletes[cartItemId].item);
                
                // Cleanup memory
                delete pendingDeletes[cartItemId];
                
                // Re-render UI
                renderCart();
                
                // Change the undo button visually so they know it worked
                btnElement.innerHTML = '<i class="fa-solid fa-check"></i> Restored';
                btnElement.style.background = '#e2e8f0';
                btnElement.style.color = '#334155';
            }
        };
        window.triggerRemove = function(cartItemId) {
            const item = currentCartData.find(i => i.id === cartItemId);
            if(!item) return;
            const isService = currentCartType === 'service';
            const itemData = isService ? item.services : item.products;
            let imgUrl = 'placeholder.jpg';
            if (itemData.images) {
                try {
                    const parsed = typeof itemData.images === 'string' ? JSON.parse(itemData.images) : itemData.images;
                    if(parsed.length > 0) imgUrl = parsed[0];
                } catch(e){}
            }
            removeItemWithUndo(cartItemId, itemData.name, imgUrl);
        };

        function updateSummary() {
            let itemTotal = 0;
            currentCartData.forEach(item => {
                const isService = currentCartType === 'service';
                const p = isService ? (parseFloat(item.services?.price) || 0) : (parseFloat(item.products?.base_price) || 0);
                itemTotal += (p * item.quantity);
            });

            document.getElementById('summ-item-total').innerText = `₹${itemTotal.toFixed(2)}`;
            
            let rapidFee = 0;
            if (currentCartType === 'rapid' && currentCartData.length > 0) {
                rapidFee = 30.00; 
                document.getElementById('summ-rapid-fee').innerText = `₹${rapidFee.toFixed(2)}`;
            }

            const grandTotal = itemTotal + rapidFee; 
            document.getElementById('summ-grand-total').innerText = `₹${grandTotal.toFixed(2)}`;
        }

        window.proceedToCheckout = function() {
            if(currentCartData.length === 0) {
                alert("Your cart is empty!");
                return;
            }
            window.location.href = `checkout.html?type=${currentCartType}`;
        };

        document.addEventListener('DOMContentLoaded', initCart);


        // ==========================================
        // UPDATED CART TYPE CHANGE (SLEEK TOAST)
        // ==========================================
        window.changeItemCartType = async function(cartItemId, newType) {
            const itemToMove = currentCartData.find(i => i.id === cartItemId);
            if(!itemToMove) return;

            const itemData = itemToMove.products;
            
            // Optimistically remove from current view
            currentCartData = currentCartData.filter(i => i.id !== cartItemId);
            renderCart(); 
            
            try {
                // Update DB
                await sb.from('cart_items').update({ cart_type: newType }).eq('id', cartItemId);
                
                // Beautiful Move Toast
                let iconStr = newType === 'rapid' ? '<i data-lucide="zap" style="color:#f59e0b;"></i>' : 
                              newType === 'pickup' ? '<i data-lucide="store" style="color:#6366f1;"></i>' : 
                              '<i data-lucide="truck" style="color:#e43e3e;"></i>';

                let typeLabel = newType === 'rapid' ? 'Rapid Delivery' : 
                                newType === 'pickup' ? 'Store Pickup' : 'Normal Delivery';

                Toastify({
                    text: `
                        <div style="display: flex; align-items: center; gap: 12px;">
                            <div style="background: #f8fafc; padding: 8px; border-radius: 50%;">
                                ${iconStr}
                            </div>
                            <div>
                                <p style="font-weight: 700; color: #0f172a; font-size: 14px; margin:0;">Item Moved!</p>
                                <p style="font-size: 12px; color: #64748b; margin:0;">Moved to ${typeLabel}</p>
                            </div>
                        </div>
                    `,
                    escapeMarkup: false,
                    duration: 3000,
                    gravity: "top",
                    position: "right",
                    style: {
                        background: "#ffffff",
                        border: "1px solid #e2e8f0",
                        borderRadius: "12px",
                        boxShadow: "0 10px 15px -3px rgba(0, 0, 0, 0.1)",
                        padding: "12px 20px",
                    }
                }).showToast();
                
                if (window.lucide) window.lucide.createIcons();
                if (typeof window.updateGlobalCartCount === 'function') window.updateGlobalCartCount();

            } catch (err) {
                console.error("Failed to change cart type:", err);
                loadCartItems(currentCartType); 
            }
        };
    </script>
</body>
</html>
