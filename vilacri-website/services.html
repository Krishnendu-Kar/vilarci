<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Services - Vilarci</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        /* Smooth fade-in for new items */
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">

    <div id="vilarci-header"></div>

    <main class="max-w-[1600px] mx-auto w-full flex-grow p-4 sm:p-6 lg:p-8">
        
        <div class="mb-6">
            <span class="text-xs font-bold text-indigo-600 uppercase tracking-wide">Explore All Services</span>
            <h1 class="text-2xl sm:text-3xl font-bold text-slate-900 mt-1">Recently Added Services</h1>
        </div>

        <div id="services-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            </div>

        <div id="loading-trigger" class="py-12 flex justify-center w-full">
            <div id="spinner" class="animate-spin rounded-full h-10 w-10 border-4 border-indigo-100 border-t-indigo-600"></div>
            <p id="end-message" class="hidden text-slate-400 text-sm font-medium">You've reached the end.</p>
        </div>
    </main>

    <script src="config.js"></script>
    <script src="header.js"></script>

    <script>
        // 1. GET DB CLIENT (From config.js)
        const db = window.supabaseClient;

        // 2. INFINITE SCROLL STATE
        let loadedCount = 0;
        let isLoading = false;
        let allLoaded = false;
        
        const INITIAL_BATCH = 25;
        const NEXT_BATCH = 14;

        // 3. FETCH LOGIC (Location Aware & Auto-Resetting)
        async function loadServices(isLoadMore = false) {
            const grid = document.getElementById('services-grid');

            // 🌟 RESET STATE ON NEW LOCATION
            if (!isLoadMore) {
                loadedCount = 0;
                allLoaded = false;
                if(grid) grid.innerHTML = '';
                document.getElementById('spinner').classList.remove('hidden');
                document.getElementById('end-message').classList.add('hidden');
            }

            if (isLoading || allLoaded || !db) return;
            isLoading = true;

            try {
                // 🌟 STEP A: Smart Location Check
                const savedLoc = localStorage.getItem('vilarci_user_location');
                let validSellerIds = null;

                if (savedLoc) {
                    const locObj = JSON.parse(savedLoc);
                    let subZoneIds = [];

                    if (locObj.type === 'district') {
                        const { data } = await db.from('sub_zones').select('id').eq('district_id', locObj.id);
                        subZoneIds = data ? data.map(z => z.id) : [];
                    } else if (locObj.type === 'main_zone') {
                        const { data } = await db.from('sub_zones').select('id').eq('main_zone_id', locObj.id);
                        subZoneIds = data ? data.map(z => z.id) : [];
                    } else {
                        subZoneIds = [parseInt(locObj.id)];
                    }

                    if (subZoneIds.length > 0) {
                        const { data: sellers } = await db.from('seller_delivery_zones').select('seller_id').in('sub_zone_id', subZoneIds);
                        validSellerIds = sellers ? [...new Set(sellers.map(s => s.seller_id))] : [];
                    } else {
                        validSellerIds = [];
                    }
                }

                // 🌟 STEP B: Empty State if No Providers
                if (validSellerIds !== null && validSellerIds.length === 0) {
                    if (!isLoadMore) {
                        grid.innerHTML = `
                            <div class="col-span-full text-center py-16">
                                <i data-lucide="map-pin-off" class="w-14 h-14 mx-auto text-slate-300 mb-4"></i>
                                <h3 class="text-xl font-bold text-slate-700 mb-1">No Services Available</h3>
                                <p class="text-slate-500 font-medium">We don't have any service providers in this area yet.</p>
                            </div>
                        `;
                        if(window.lucide) window.lucide.createIcons();
                    }
                    allLoaded = true;
                    stopLoadingUI();
                    return;
                }

                const limit = loadedCount === 0 ? INITIAL_BATCH : NEXT_BATCH;
                const from = loadedCount;
                const to = from + limit - 1;

            // STEP C: Build Query
                let query = db
                    .from('services')
                    .select('name, slug, price, normal_price, images, badge_label, service_duration, shops_public_587(store_name)')
                    .eq('is_active', true)
                    .range(from, to)
                    .order('id', { ascending: false });
                // Apply Location Filter
                if (validSellerIds !== null && validSellerIds.length > 0) {
                    query = query.in('seller_id', validSellerIds);
                }

                const { data, error } = await query;

                if (error) throw error;

                if (!data || data.length === 0) {
                    if (!isLoadMore) {
                        grid.innerHTML = `
                            <div class="col-span-full text-center py-16 text-slate-500">
                                <i data-lucide="briefcase" class="w-12 h-12 mx-auto text-slate-300 mb-3"></i>
                                <p class="font-bold">No services found.</p>
                            </div>`;
                        if(window.lucide) window.lucide.createIcons();
                    }
                    allLoaded = true;
                    stopLoadingUI();
                    return;
                }

                renderCards(data);
                loadedCount += data.length;

                if (data.length < limit) {
                    allLoaded = true;
                    stopLoadingUI();
                }

            } catch (err) {
                console.error("Fetch Error:", err);
            } finally {
                isLoading = false;
            }
        }

        // 4. RENDER LOGIC
        function renderCards(services) {
            const grid = document.getElementById('services-grid');

            services.forEach(svc => {
                const card = document.createElement('div');
                card.className = "bg-white border border-slate-200 rounded-xl overflow-hidden hover:shadow-lg transition cursor-pointer fade-in flex flex-col h-full group";
                card.onclick = () => window.location.href = `service_details.html?slug=${svc.slug}`;

                // 🌟 UPDATED: Fallback logic for old image_url vs new images array
                const imgUrl = (svc.images && svc.images.length > 0) ? svc.images[0] : 'logo.png';
                
                let priceHtml = `<span class="text-lg font-bold text-slate-900">₹${svc.price}</span>`;
                if (svc.normal_price && svc.normal_price > svc.price) {
                    priceHtml += `<span class="ml-2 text-sm text-slate-400 line-through">₹${svc.normal_price}</span>`;
                }

                // 🌟 UPDATED: Duration logic favors the new text string
                const displayDuration = svc.service_duration ? svc.service_duration : '';
                
                // 🌟 NEW: Show provider name
                const providerName = svc.shops_public_587 ? svc.shops_public_587.store_name : 'Vilarci Verified';

                const badge = svc.badge_label 
                    ? `<span class="absolute top-2 left-2 bg-indigo-600 text-white text-[10px] font-bold px-2 py-1 rounded shadow">${escapeHtml(svc.badge_label)}</span>` 
                    : '';

                card.innerHTML = `
                    <div class="relative aspect-[4/3] bg-slate-100 flex items-center justify-center overflow-hidden border-b border-slate-100">
                        <img src="${imgUrl}" class="w-full h-full object-cover group-hover:scale-105 transition duration-500">
                        ${badge}
                    </div>
                    <div class="p-4 flex flex-col flex-grow">
                        <div class="flex justify-between items-start mb-1">
                            <h3 class="font-bold text-slate-900 line-clamp-2 text-base leading-snug pr-2">${escapeHtml(svc.name)}</h3>
                        </div>
                        <p class="text-[11px] font-bold text-indigo-600 uppercase tracking-wider mb-3 line-clamp-1">${escapeHtml(providerName)}</p>
                        
                        ${displayDuration ? `
                        <div class="flex items-center gap-2 text-xs text-slate-500 mb-4 font-medium bg-slate-50 w-fit px-2 py-1 rounded">
                            <i data-lucide="clock" class="w-3 h-3"></i> ${displayDuration}
                        </div>` : '<div class="mb-4"></div>'}

                        <div class="mt-auto flex items-center justify-between pt-3 border-t border-slate-50">
                            <div class="flex items-baseline">${priceHtml}</div>
                            <button class="bg-indigo-50 text-indigo-600 p-2 rounded-lg group-hover:bg-indigo-600 group-hover:text-white transition shadow-sm">
                                <i data-lucide="arrow-right" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
            
            if(window.lucide) window.lucide.createIcons();
        }

        function stopLoadingUI() {
            document.getElementById('spinner').classList.add('hidden');
            document.getElementById('end-message').classList.remove('hidden');
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.innerText = text;
            return div.innerHTML;
        }

        // 5. OBSERVER & INSTANT RELOAD EVENT
        document.addEventListener('DOMContentLoaded', () => {
            const observer = new IntersectionObserver((entries) => {
                if (entries[0].isIntersecting) loadServices(true); // Pass true to append next page
            }, { rootMargin: '100px' });
            
            observer.observe(document.getElementById('loading-trigger'));
            
            // First load
            loadServices(false);
        });

        // 🌟 INSTANT RELOAD WHEN LOCATION CHANGES!
        window.addEventListener('vilarciLocationChanged', () => loadServices(false));
    </script>
</body>
</html>
