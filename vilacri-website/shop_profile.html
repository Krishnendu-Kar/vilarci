<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Profile - Vilarci</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; }

        .discount-percent {
            display:flex;
            z-index: 20;
            position:absolute;
            right: 0px;
            background-color:rgb(0, 21, 255);
            font-size:12px;
            padding: 4px 4px 6px 8px;
            color:rgb(246, 246, 244);
            border: 1px solid rgb(113, 4, 150);
            border-top-right-radius: 5.5px;
            clip-path: polygon(
                0 0, 100% 0, 100% 80%, 
                95% 100%, 85% 80%, 75% 100%, 
                65% 80%, 55% 100%, 45% 80%, 
                35% 100%, 25% 80%, 15% 100%, 
                5% 80%, 0 100%
            );        
        } 
        .product-name{ color:#212121 !important; }
        
        .rating_avg{
            font-size: 0.85rem;
            background-color:#1b9d76;
            color:white;
            padding: 1px 6px;
            border-radius: 6px;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 2px;
        }
        .rating_count{
            font-size: 0.8rem;
            font-weight: 500;
            color: #64748b;
            margin-left: 4px;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">

    <div id="vilarci-header"></div>

    <main class="flex-grow w-full">
        <div id="loader" class="flex flex-col items-center justify-center h-[60vh]">
            <div class="animate-spin rounded-full h-12 w-12 border-4 border-indigo-100 border-t-indigo-600 mb-4"></div>
            <p class="text-slate-500 font-medium">Visiting Shop...</p>
        </div>

        <div id="error-screen" class="hidden flex flex-col items-center justify-center h-[60vh] text-center px-4">
            <div class="bg-red-50 p-4 rounded-full mb-4">
                <i data-lucide="store-off" class="w-10 h-10 text-red-400"></i>
            </div>
            <h2 class="text-xl font-bold text-slate-800" id="error-title">Shop Not Found</h2>
            <p class="text-slate-500 mt-2 mb-6" id="error-msg">The shop link might be incorrect or the seller has closed their store.</p>
            <a href="index.html" class="bg-indigo-600 text-white px-6 py-2 rounded-xl font-bold hover:bg-indigo-700 transition">Back to Vilarci</a>
        </div>

        <div id="shop-container" class="hidden">
            
            <div class="bg-gradient-to-r from-indigo-50 to-white border-b border-slate-200">
                <div class="max-w-7xl mx-auto px-4 py-6 sm:py-8">
                    <div class="flex flex-row items-start gap-4">
                        
                        <div class="w-16 h-16 sm:w-20 sm:h-20 bg-white rounded-2xl flex items-center justify-center border-2 border-indigo-100 shadow-md shrink-0">
                            <span class="text-2xl sm:text-3xl font-extrabold text-indigo-600" id="shop-initial">S</span>
                        </div>
                        
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-2 mb-1">
                                <h1 class="text-xl sm:text-3xl font-extrabold text-slate-900 truncate" id="shop-name">...</h1>
                                <span id="verified-badge" class="hidden mt-1" title="Verified Seller">
                                    <i data-lucide="badge-check" class="w-6 h-6 text-blue-500 fill-blue-100"></i>
                                </span>
                            </div>

                            <div class="flex flex-wrap items-center text-xs sm:text-sm text-slate-500 mb-3 gap-y-1 font-medium">
                                <span class="flex items-center gap-1 mr-3">
                                    <i data-lucide="map-pin" class="w-3.5 h-3.5"></i> 
                                    <span id="shop-location">...</span>
                                </span>
                                <span class="text-slate-300 mr-3">|</span>
                                <span id="product-count" class="text-indigo-600 font-bold">0 Products</span>
                            </div>
                            
                            <div class="flex flex-wrap gap-2 items-center">
                                <div class="flex items-center bg-green-50 px-2.5 py-1 rounded border border-green-100">
                                    <span class="text-green-700 text-xs font-bold flex items-center gap-1">
                                        4.8 <i data-lucide="star" class="w-3 h-3 fill-current"></i>
                                    </span>
                                </div>
                               
                                <span class="px-2.5 py-1 bg-white text-slate-600 text-xs font-bold rounded border border-slate-200 truncate max-w-[120px]" id="shop-category">General Store</span>
                                
                                <div id="direction" class="hidden px-3 py-1 bg-indigo-600 text-white text-xs font-bold rounded shadow-sm cursor-pointer hover:bg-indigo-700 transition items-center gap-1">
                                    <i data-lucide="navigation" class="w-3 h-3"></i> 
                                    <span class="hidden sm:inline">Direction</span>
                                    <span class="sm:hidden">Map</span>
                                </div>
                            </div>
                        </div>
                        
                        <div class="shrink-0">
                            <button class="bg-slate-900 text-white rounded-xl hover:bg-slate-800 transition shadow-md flex items-center justify-center p-3 sm:px-5 sm:py-2.5" title="Contact Seller">
                                <i data-lucide="message-circle" class="w-5 h-5 sm:w-4 sm:h-4 sm:mr-2"></i>
                                <span class="hidden sm:inline text-sm font-bold">Contact</span>
                            </button>
                        </div>

                    </div>
                </div>
            </div>
            
            <div class="max-w-7xl mx-auto px-4 py-8">
                <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-6">
                    <h2 class="text-xl font-bold text-slate-800 shrink-0">Shop Products</h2>
                    
                    <div class="flex flex-col sm:flex-row gap-3 w-full md:w-auto md:flex-1 md:justify-end">
                        <div class="relative flex-1 md:max-w-xs">
                            <input type="text" id="shop-search" placeholder="Search in this shop..." 
                                class="w-full pl-9 pr-4 py-2 bg-white border border-slate-300 rounded-xl text-sm focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 outline-none transition shadow-sm"
                                oninput="filterShopProducts(this.value)">
                            <div class="absolute left-3 top-2.5 text-slate-400">
                                <i data-lucide="search" class="w-4 h-4"></i>
                            </div>
                        </div>

                        <select id="sort-dropdown" onchange="sortProducts(this.value)" class="w-full sm:w-auto bg-white border border-slate-300 text-slate-700 text-sm font-medium rounded-xl px-3 py-2 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 outline-none shadow-sm cursor-pointer">
                            <option value="newest">Newest First</option>
                            <option value="low_high">Price: Low to High</option>
                            <option value="high_low">Price: High to Low</option>
                        </select>
                    </div>
                </div>
                
                <div id="products-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-3 sm:gap-6">
                    </div>
                
                <div id="empty-products" class="hidden py-16 text-center bg-white rounded-2xl border border-dashed border-slate-300">
                    <div class="inline-flex items-center justify-center w-14 h-14 bg-slate-50 rounded-full mb-3">
                        <i data-lucide="package-open" class="w-7 h-7 text-slate-400"></i>
                    </div>
                    <h3 class="text-base font-bold text-slate-700">No products found</h3>
                    <p class="text-xs text-slate-500">Try adjusting your search or filters.</p>
                </div>
            </div>

        </div>
    </main>

    <script src="config.js"></script>
    <script src="header.js"></script>

    <script>
        // ==========================================
        // GLOBAL VARIABLES
        // ==========================================
        const db = window.supabaseClient; // Securely fetched from config.js
        let allShopProducts = [];

        // ==========================================
        // INITIALIZATION
        // ==========================================
        async function initShopPage() {
            if (!db) {
                showError("Connection Error", "Could not connect to the database.");
                return;
            }

            const urlParams = new URLSearchParams(window.location.search);
            const slug = urlParams.get('slug');

            if (!slug) {
                showError("Invalid Link", "No shop ID was provided.");
                return;
            }

            // 1. Fetch Seller Data
            const { data: seller, error } = await db
                .from('shops_public_587') 
                .select('*') 
                .eq('shop_slug', slug)
                .single();

            if (error || !seller) {
                console.error("Seller Fetch Error:", error);
                showError("Shop Unavailable", "This shop may be closed or the link is broken.");
                return;
            }

            renderShopHeader(seller);

            // 2. Fetch Products for this seller
            const { data: products, error: prodError } = await db
                .from('products')
                .select('*')
                .eq('seller_id', seller.seller_numeric_id)
                .eq('is_active', true)
                .order('created_at', { ascending: false });

            if (prodError) console.error("Products Fetch Error:", prodError);
            
            allShopProducts = products || [];
            renderProductGrid(allShopProducts);

            // Hide Loader, Show Content
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('shop-container').classList.remove('hidden');
        }

        // ==========================================
        // RENDERING LOGIC
        // ==========================================
        function renderShopHeader(seller) {
            document.getElementById('shop-name').innerText = seller.store_name || "Vilarci Partner";
            const initial = seller.shop_name ? seller.shop_name.charAt(0).toUpperCase() : 'S';
            document.getElementById('shop-initial').innerText = initial;
            
            document.getElementById('shop-location').innerText = `Pincode: ${seller.pincode}`;
            
            // Direction Button Logic
            const dirBtn = document.getElementById('direction');
            if (seller.direction && seller.direction.length > 0) {
                dirBtn.onclick = () => window.open(seller.direction, '_blank'); // Opens map in new tab
                dirBtn.classList.remove('hidden');
                dirBtn.classList.add('flex');
            }

            if(seller.is_verified) {
                document.getElementById('verified-badge').classList.remove('hidden');
            }
        }

        function renderProductGrid(products) {
            document.getElementById('product-count').innerText = `${products.length} Products`;
            const grid = document.getElementById('products-grid');
            const empty = document.getElementById('empty-products');
            
            grid.innerHTML = '';

            if (products.length === 0) {
                grid.classList.add('hidden');
                empty.classList.remove('hidden');
                return;
            }
            
            grid.classList.remove('hidden');
            empty.classList.add('hidden');

            grid.innerHTML = products.map(p => {
                const img = (p.images && p.images.length > 0) ? p.images[0] : 'logo.png'; // Fallback
                
                let discountBadge = '';
                if (p.original_price && p.base_price < p.original_price) {
                    const off = Math.round(((p.original_price - p.base_price) / p.original_price) * 100);
                    discountBadge = `<span class="discount-percent">${off}% OFF</span>`;
                }

                return `
                <div onclick="window.location.href='product_details.html?slug=${p.slug || p.id}'" 
                     class="bg-white border border-slate-200 rounded-xl overflow-hidden cursor-pointer hover:-translate-y-1 hover:shadow-xl transition-all duration-300 relative group flex flex-col h-full">
                    ${discountBadge}
                    
                    <div class="aspect-square bg-white flex items-center justify-center p-4 overflow-hidden relative">
                        <img src="${img}" class="w-full h-full object-contain mix-blend-multiply group-hover:scale-105 transition-transform duration-500" loading="lazy">
                    </div>
                    
                    <div class="p-3 flex flex-col flex-grow border-t border-slate-50">
                        <h3 class="product-name text-[13px] sm:text-sm font-bold leading-tight line-clamp-2 mb-2 h-10">${p.name}</h3>
                        
                        <div class="flex items-center mb-2">
                            <span class="rating_avg">
                                ${p.rating_avg || 4.5} <i class="fa-solid fa-star text-[0.6em]"></i>
                            </span>
                            <span class="rating_count">(${p.rating_count || 0})</span> 
                        </div>

                        <div class="flex items-baseline gap-1.5 mt-auto">
                            <span class="text-base sm:text-lg font-bold text-slate-900">₹${p.base_price}</span>
                            ${p.original_price ? `<span class="text-xs text-slate-400 line-through">₹${p.original_price}</span>` : ''}
                        </div>
                        
                        <button onclick="addToCart(event, '${p.id}')" class="w-full mt-3 bg-yellow-400 text-slate-900 text-xs sm:text-sm font-bold py-2 rounded-lg hover:bg-yellow-500 transition flex items-center justify-center gap-1 shadow-sm">
                             Add <i class="fa-solid fa-cart-plus"></i>
                        </button>
                    </div>
                </div>
                `;
            }).join('');
            
            if(window.lucide) window.lucide.createIcons();
        }

        // ==========================================
        // FILTER & SORT LOGIC
        // ==========================================
        function filterShopProducts(query) {
            const lowerQ = query.toLowerCase();
            const filtered = allShopProducts.filter(p => p.name.toLowerCase().includes(lowerQ));
            const sortMode = document.getElementById('sort-dropdown').value;
            sortAndRender(filtered, sortMode);
        }

        function sortProducts(mode) {
            const query = document.getElementById('shop-search').value.toLowerCase();
            let list = allShopProducts.filter(p => p.name.toLowerCase().includes(query));
            sortAndRender(list, mode);
        }

        function sortAndRender(list, mode) {
            if (mode === 'low_high') list.sort((a, b) => a.base_price - b.base_price);
            else if (mode === 'high_low') list.sort((a, b) => b.base_price - a.base_price);
            else list.sort((a, b) => new Date(b.created_at) - new Date(a.created_at)); // Newest
            renderProductGrid(list);
        }

        // ==========================================
        // CART LOGIC
        // ==========================================
        function addToCart(event, id) {
            event.stopPropagation();
            const product = allShopProducts.find(p => String(p.id) === String(id));
            if (!product) return;

            // Fashion Check
            const idString = String(product.id);
            if (idString.substring(6, 8) === '12') {
                Toastify({
                    text: "Please select a size first",
                    duration: 2000,
                    style: { background: "#3b82f6", borderRadius: "8px", fontSize: "12px" }
                }).showToast();
                setTimeout(() => window.location.href = `product_details.html?slug=${product.slug || product.id}`, 800);
                return; 
            }

            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            const cartItem = {
                id: product.id, 
                slug: product.slug, 
                name: product.name,
                price: product.base_price, 
                originalPrice: product.original_price,
                amount: product.amount || "1 Unit",
                image: (product.images && product.images.length > 0) ? product.images[0] : "logo.png",
                quantity: 1, 
                cartItemId: String(product.id)
            };

            const existingIndex = cart.findIndex(item => String(item.id) === String(id));
            if (existingIndex > -1) {
                cart[existingIndex].quantity += 1;
            } else {
                cart.push(cartItem);
            }

            localStorage.setItem('cart', JSON.stringify(cart));
            
            // FIX: Trigger the global header cart update function!
            if (window.updateGlobalCartCount) window.updateGlobalCartCount();
            
            Toastify({
                text: "Added to Cart!",
                duration: 2000,
                gravity: "top",
                position: "center",
                style: { background: "#22c55e", borderRadius: "8px", fontSize: "14px", fontWeight: "bold" }
            }).showToast();
        }

        function showError(title, msg) {
            document.getElementById('loader').classList.add('hidden');
            if(title) document.getElementById('error-title').innerText = title;
            if(msg) document.getElementById('error-msg').innerText = msg;
            document.getElementById('error-screen').classList.remove('hidden');
        }

        // Start Execution
        document.addEventListener('DOMContentLoaded', initShopPage);
    </script>
</body>
</html>
