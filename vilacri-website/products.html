        <script>
           // 1. Select the element and store it in a constant
            const locationElement = document.querySelector('.location-name');

            // 2. Get the text content and remove extra whitespace (newlines)
            if(locationElement) {
                let text = locationElement.textContent.trim(); 
                // 3. Check length and truncate if necessary
                const truncatedText = text.length > 7 ? text.substring(0, 7) + "..." : text;
                // 4. Update the HTML
                locationElement.innerHTML = `<i class="fa-solid fa-location-dot"></i> ${truncatedText}`;
            }
        </script>

        <script>
        let packetProducts = [];
        let currentOffset = 0;
        const LIMIT = 24;
        let isFetching = false;
        let allProductsLoaded = false;

        async function fetchAndDisplayProducts(isLoadMore = false) {
            const loader = document.getElementById('page-loader');
            const container = document.getElementById('productList');
            
            if (!isLoadMore) {
                currentOffset = 0;
                allProductsLoaded = false; 
                packetProducts = [];
                if (container) container.innerHTML = ''; 
                if (loader) loader.style.display = 'flex';
            }

            if (isFetching || allProductsLoaded) return;
            isFetching = true;

            try {
                const savedLoc = localStorage.getItem('vilarci_user_location');
                let validSellerIds = null;

                if (savedLoc) {
                    const locObj = JSON.parse(savedLoc);
                    let subZoneIds = [];

                    if (locObj.type === 'district') {
                        const { data } = await window.supabaseClient.from('sub_zones').select('id').eq('district_id', locObj.id);
                        subZoneIds = data ? data.map(z => z.id) : [];
                    } else if (locObj.type === 'main_zone') {
                        const { data } = await window.supabaseClient.from('sub_zones').select('id').eq('main_zone_id', locObj.id);
                        subZoneIds = data ? data.map(z => z.id) : [];
                    } else {
                        subZoneIds = [parseInt(locObj.id)]; 
                    }

                    if (subZoneIds.length > 0) {
                        const { data: sellers } = await window.supabaseClient.from('seller_delivery_zones').select('seller_id').in('sub_zone_id', subZoneIds);
                        validSellerIds = sellers ? [...new Set(sellers.map(s => s.seller_id))] : [];
                    } else {
                        validSellerIds = [];
                    }
                }

                if (validSellerIds !== null && validSellerIds.length === 0) {
                    if (!isLoadMore) {
                        container.innerHTML = `
                        <div style="text-align:center; padding: 40px; grid-column: 1/-1; width: 100%;">
                            <i class="fa-solid fa-location-dot" style="font-size: 40px; color: #cbd5e1; margin-bottom: 15px;"></i>
                            <h3 style="color: #475569; font-size: 18px; font-weight: bold;">No Delivery Available</h3>
                            <p style="color: #64748b; font-size: 14px;">We don't have sellers delivering to this area yet.</p>
                        </div>`;
                    }
                    allProductsLoaded = true;
                    return;
                }

                // 🌟 FETCH FLAGS INCLUDED HERE
                let query = window.supabaseClient
                    .from('products')
                    .select('id, slug, name, base_price, original_price, rating_avg, rating_count, images, category_id, amount, is_rapid_eligible, is_pickup_eligible')
                    .eq('is_active', true)
                    .order('created_at', { ascending: false })
                    .range(currentOffset, currentOffset + LIMIT - 1);

                if (validSellerIds !== null && validSellerIds.length > 0) {
                    query = query.in('seller_id', validSellerIds);
                }

                const { data, error } = await query;
                if (error) throw error;

                if (data) {
                    if (data.length < LIMIT) allProductsLoaded = true; 
                    currentOffset += data.length;

                    const newProducts = data.map(p => ({
                        id: p.id, slug: p.slug, name: p.name, price: p.base_price, originalPrice: p.original_price,
                        rating_avg : p.rating_avg, rating_count: p.rating_count,
                        image: (p.images && p.images.length > 0) ? p.images[0] : 'logo.png',
                        category: p.category_id, amount: p.amount,
                        is_rapid_eligible: Boolean(p.is_rapid_eligible),
                        is_pickup_eligible: Boolean(p.is_pickup_eligible)
                    }));

                    packetProducts.push(...newProducts);
                    displayProducts(newProducts, 'productList'); 
                }

            } catch (err) {
                console.error("Unexpected error:", err);
                if (!isLoadMore) container.innerHTML = '<p style="text-align:center; grid-column: 1/-1;">Connection Error.</p>';
            } finally {
                if(!isLoadMore && loader) {
                    loader.style.opacity = "0"; 
                    setTimeout(() => { loader.style.display = "none"; loader.style.opacity = "1"; }, 300); 
                }
                isFetching = false;
            }
        }
        
        function displayProducts(products, containerId) {
            const container = document.getElementById(containerId);
            
            let html = '';
            products.forEach(product => {
                let discountBadge = '';
                if (product.originalPrice > product.price) {
                    const off = Math.round(((product.originalPrice - product.price) / product.originalPrice) * 100);
                    discountBadge = `<div class="discount-percent">${off}% OFF</div>`;
                }

                html += `
                    <div class="product-card" onclick="window.location.href='product_details.html?slug=${product.slug}'">
                        ${discountBadge}

                        <button class="wishlist-btn absolute top-7 bg-gradient-to-r from-[#FFF0F0] to-[#FFF0FC] right-2 p-1.5 bg-white/90 backdrop-blur-sm rounded-full shadow-sm hover:scale-110 transition z-20 text-slate-400 flex items-center justify-center w-8 h-8 border border-slate-100/50" 
                                data-item-id="${product.id}" 
                                onclick="window.toggleWishlist(event, '${product.id}', 'product')">
                            <i class="fa-regular fa-heart text-[15px] text-red-500 drop-shadow-sm transition-colors"></i>
                        </button>

                        <div class="img-box"><img src="${product.image}" alt="${product.name}" loading="lazy"></div>
                        <div class="details">
                            <div>
                                <h4 class="product-name">${product.name}</h4>
                                <p><span class="rating_avg">${product.rating_avg || 4.5} <i class="fa-solid fa-star" style="font-size:0.6em;"></i></span> <span class="rating_count"> ${product.rating_count || 0} Ratings</span></p>
                            </div>
                            
                            <div class="price-area">
                                <span class="price">₹${product.price}</span>
                                ${product.originalPrice ? `<span class="mrp">₹${product.originalPrice}</span>` : ''}
                            </div>
                            
                            <div class="bottom-btn">
                                <button class="add-btn btn-relative" 
                                        data-product-id="${product.id}"
                                        onclick="event.stopPropagation(); window.vilarciAddToCart('${product.id}', ${product.price}, '1 Unit', ${product.is_rapid_eligible});">
                                    <i class="fa-solid fa-cart-plus"></i>
                                </button>
                                
                                <button class="pickup-btn btn-relative" 
                                        data-product-id="${product.id}"
                                        onclick="event.stopPropagation(); window.vilarciStorePickup('${product.id}', ${product.price}, '1 Unit', ${product.is_pickup_eligible});">
                                    Store Pickup <i class="fa-solid fa-motorcycle"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            });
            container.innerHTML += html; 

            // 🌟 RENDER THE BADGES AFTER HTML INJECTION
            if(typeof window.renderCartBadges === 'function') window.renderCartBadges();
            if(typeof window.renderWishlistIcons === 'function') window.renderWishlistIcons();
        }

        window.addEventListener('scroll', () => {
            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 600) {
                fetchAndDisplayProducts(true);
            }
        });

        document.addEventListener("DOMContentLoaded", () => fetchAndDisplayProducts(false));
        window.addEventListener('vilarciLocationChanged', () => fetchAndDisplayProducts(false));
        
    </script>
