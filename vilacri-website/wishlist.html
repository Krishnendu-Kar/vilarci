<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Wishlist - Vilarci</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="stylesheet" type="text/css" href="product-card.css">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; }
        
        .tab-btn {
            transition: all 0.2s ease;
            position: relative;
        }
        .tab-btn::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: transparent;
            transition: background-color 0.2s ease;
        }
        .tab-btn.active {
            color: #e43e3e; /* Vilarci Red */
            font-weight: 700;
        }
        .tab-btn.active::after {
            background-color: #e43e3e;
        }
        
        /* Instant Hide Animation for removing items */
        .removing {
            transform: scale(0.9);
            opacity: 0;
            transition: all 0.2s ease-out;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">

    <div id="vilarci-header"></div>

    <main class="flex-grow w-full max-w-7xl mx-auto px-4 py-6 sm:py-8">
        
        <div class="flex items-center gap-3 mb-6">
            <div class="bg-red-100 p-2.5 rounded-xl text-red-500 shadow-sm">
                <i class="fa-solid fa-heart text-xl"></i>
            </div>
            <div>
                <h1 class="text-2xl sm:text-3xl font-extrabold text-slate-900 tracking-tight">My Wishlist</h1>
                <p class="text-sm text-slate-500 font-medium">Items you've saved for later</p>
            </div>
        </div>

        <div id="loader" class="flex flex-col items-center justify-center py-20">
            <div class="animate-spin rounded-full h-10 w-10 border-4 border-slate-200 border-t-red-500 mb-4"></div>
            <p class="text-slate-500 font-medium">Loading your favorites...</p>
        </div>

        <div id="content-container" class="hidden">
            
            <div class="flex gap-6 border-b border-slate-200 mb-6">
                <button class="tab-btn active pb-3 text-slate-500 hover:text-slate-800 font-medium text-sm sm:text-base" id="tab-products" onclick="switchTab('products')">
                    Products (<span id="prod-count">0</span>)
                </button>
                <button class="tab-btn pb-3 text-slate-500 hover:text-slate-800 font-medium text-sm sm:text-base" id="tab-services" onclick="switchTab('services')">
                    Services (<span id="serv-count">0</span>)
                </button>
            </div>
            
            <div id="products-container">
                <div id="products-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-3 sm:gap-6"></div>
                
                <div id="empty-products" class="hidden py-16 text-center bg-white rounded-2xl border border-dashed border-slate-300">
                    <div class="inline-flex items-center justify-center w-16 h-16 bg-red-50 text-red-300 rounded-full mb-4">
                        <i class="fa-regular fa-heart text-3xl"></i>
                    </div>
                    <h3 class="text-lg font-bold text-slate-700">No saved products</h3>
                    <p class="text-sm text-slate-500 mt-1 mb-6">You haven't added any products to your wishlist yet.</p>
                    <button onclick="window.location.href='index.html'" class="bg-red-500 text-white px-6 py-2.5 rounded-xl font-bold hover:bg-red-600 transition shadow-sm">Start Shopping</button>
                </div>
            </div>

            <div id="services-container" class="hidden">
                <div id="services-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-3 sm:gap-6"></div>
                
                <div id="empty-services" class="hidden py-16 text-center bg-white rounded-2xl border border-dashed border-slate-300">
                    <div class="inline-flex items-center justify-center w-16 h-16 bg-red-50 text-red-300 rounded-full mb-4">
                        <i class="fa-regular fa-heart text-3xl"></i>
                    </div>
                    <h3 class="text-lg font-bold text-slate-700">No saved services</h3>
                    <p class="text-sm text-slate-500 mt-1 mb-6">You haven't bookmarked any services yet.</p>
                    <button onclick="window.location.href='services.html'" class="bg-red-500 text-white px-6 py-2.5 rounded-xl font-bold hover:bg-red-600 transition shadow-sm">Explore Services</button>
                </div>
            </div>

        </div>
    </main>

    <script src="config.js"></script>
    <script src="header.js"></script>

    <script>
        const db = window.supabaseClient;
        let activeTab = 'products';
        let isDeliveryAvailable = true; 

        async function initWishlist() {
            // Ensure header.js session check has finished
            setTimeout(async () => {
                if (!window.vilarciUser) {
                    window.location.href = 'user_login.html';
                    return;
                }
                await fetchWishlistData();
            }, 500); 
        }

        async function fetchWishlistData() {
            try {
                // 🚀 BLAZING FAST: Fetch Wishlist + Product Data + Service Data in 1 single network request!
                const { data, error } = await db.from('wishlist_items')
                    .select(`
                        id,
                        item_type,
                        product_id,
                        service_id,
                        products ( id, name, slug, base_price, original_price, images, is_rapid_eligible, is_pickup_eligible, rating_avg, rating_count ),
                        services ( id, name, slug, price, normal_price, images, service_duration )
                    `)
                    .eq('user_id', window.vilarciUser.id)
                    .order('created_at', { ascending: false });

                if (error) throw error;

                const productsList = [];
                const servicesList = [];

                data.forEach(item => {
                    if (item.item_type === 'product' && item.products) productsList.push(item.products);
                    if (item.item_type === 'service' && item.services) servicesList.push(item.services);
                });

                document.getElementById('prod-count').innerText = productsList.length;
                document.getElementById('serv-count').innerText = servicesList.length;

                renderProducts(productsList);
                renderServices(servicesList);

                document.getElementById('loader').classList.add('hidden');
                document.getElementById('content-container').classList.remove('hidden');

            } catch (err) {
                console.error("Wishlist Fetch Error:", err);
                Toastify({ text: "Failed to load wishlist", style: { background: "#ef4444" } }).showToast();
            }
        }

        // ==========================================
        // ZERO-LATENCY REMOVE LOGIC
        // ==========================================
        window.instantRemove = function(event, itemId, itemType, cardId) {
            event.stopPropagation();
            
            // 1. Instantly hide the card from UI
            const card = document.getElementById(cardId);
            if(card) {
                card.classList.add('removing');
                setTimeout(() => card.remove(), 250); // Remove from DOM after animation
            }
            
            // 2. Adjust counter instantly
            const countEl = document.getElementById(itemType === 'product' ? 'prod-count' : 'serv-count');
            countEl.innerText = Math.max(0, parseInt(countEl.innerText) - 1);

            // 3. Check for empty state instantly
            setTimeout(() => {
                const gridId = itemType === 'product' ? 'products-grid' : 'services-grid';
                const emptyId = itemType === 'product' ? 'empty-products' : 'empty-services';
                if (document.getElementById(gridId).children.length === 0) {
                    document.getElementById(emptyId).classList.remove('hidden');
                }
            }, 300);

            // 4. Call header.js to sync with Database & Global Map in background
            window.toggleWishlist(event, itemId, itemType);
        };

        // ==========================================
        // RENDERERS
        // ==========================================
        function renderProducts(products) {
            const grid = document.getElementById('products-grid');
            const empty = document.getElementById('empty-products');

            if (products.length === 0) {
                empty.classList.remove('hidden');
                return;
            }

            let html = products.map(p => {
                const img = (p.images && p.images.length > 0) ? p.images[0] : 'logo.png';
                let discountBadge = '';
                if (p.original_price && p.base_price < p.original_price) {
                    const off = Math.round(((p.original_price - p.base_price) / p.original_price) * 100);
                    discountBadge = `<span class="discount-percent z-10">${off}% OFF</span>`;
                }
                const cardId = `wish-card-${p.id}`;

                return `
                <div id="${cardId}" class="product-card relative flex flex-col justify-between h-full" style="cursor:pointer;" onclick="window.location.href='product_details.html?slug=${p.slug}'">
                    ${discountBadge}
                    
                    <button class="absolute top-2 right-2 p-1.5 bg-white/90 backdrop-blur-sm rounded-full shadow-sm hover:scale-110 transition z-20 text-red-500 flex items-center justify-center w-8 h-8 border border-red-100" 
                            onclick="instantRemove(event, '${p.id}', 'product', '${cardId}')">
                        <i class="fa-solid fa-heart text-[15px] drop-shadow-sm"></i>
                    </button>

                    <div class="img-box"><img src="${img}" alt="${p.name}" loading="lazy"></div>
                    <div class="details flex flex-col flex-grow">
                        <h4 class="product-name">${p.name}</h4>
                        <p class="mb-2"><span class="rating_avg">${p.rating_avg || 4.5} <i class="fa-solid fa-star text-[10px]"></i></span></p>
                        
                        <div class="price-area mb-3 mt-auto">
                            <span class="price font-bold text-lg text-slate-900">₹${p.base_price}</span>
                            ${p.original_price ? `<span class="mrp text-sm text-slate-400 line-through ml-2">₹${p.original_price}</span>` : ''}
                        </div>
                        
                        <div class="bottom-btn flex gap-2">
                            <button class="add-btn" 
                                    data-product-id="${p.id}"
                                    onclick="event.stopPropagation(); window.vilarciAddToCart('${p.id}', ${p.base_price}, '1 Unit', ${p.is_rapid_eligible});">
                                <i class="fa-solid fa-cart-plus"></i>
                            </button>
                            <button class="pickup-btn text-[11px] sm:text-[13px]"  
                                    data-product-id="${p.id}"
                                    onclick="event.stopPropagation(); window.vilarciStorePickup('${p.id}', ${p.base_price}, '1 Unit', ${p.is_pickup_eligible});">
                                Store Pickup <i class="fa-solid fa-motorcycle"></i> 
                            </button>
                        </div>
                    </div>
                </div>`;
            }).join('');
            
            grid.innerHTML = html;
            if(typeof window.renderCartBadges === 'function') window.renderCartBadges();
        }

        function renderServices(services) {
            const grid = document.getElementById('services-grid');
            const empty = document.getElementById('empty-services');

            if (services.length === 0) {
                empty.classList.remove('hidden');
                return;
            }

            let html = services.map(s => {
                const imgArray = s.images || [];
                const img = imgArray.length > 0 ? imgArray[0] : 'logo.png';
                const targetSlug = s.slug || s.id;
                const cardId = `wish-card-srv-${s.id}`;
                
                let discountServiceBadge = '';
                if (s.normal_price && s.price < s.normal_price) {
                    const off = Math.round(((s.normal_price - s.price) / s.normal_price) * 100);
                    discountServiceBadge = `<span class="discount-percent z-10">${off}% OFF</span>`;
                }

                const safeName = (s.name || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
                const safeDurationUI = s.service_duration ? s.service_duration.replace(/</g, '&lt;') : '1 Session';
                const jsSafeDuration = (s.service_duration || '1 Session').replace(/'/g, "\\'").replace(/"/g, '&quot;');

                return `
                <div id="${cardId}" class="product-card relative" onclick="window.location.href='service_details.html?slug=${targetSlug}'">
                    ${discountServiceBadge}
                    
                    <button class="absolute top-2 right-2 p-1.5 bg-white/90 backdrop-blur-sm rounded-full shadow-sm hover:scale-110 transition z-20 text-red-500 flex items-center justify-center w-8 h-8 border border-red-100" 
                            onclick="instantRemove(event, '${s.id}', 'service', '${cardId}')">
                        <i class="fa-solid fa-heart text-[15px] drop-shadow-sm"></i>
                    </button>

                    <div class="img-box"><img src="${img}" alt="${safeName}" loading="lazy"></div>
                    <div class="details p-4">
                        <h4 class="product-name">${safeName}</h4>
                        <div class="text-xs text-slate-500 mb-2 font-medium flex items-center gap-1"><i data-lucide="clock" class="w-3.5 h-3.5"></i> ${safeDurationUI}</div>
                        <div class="mt-auto flex items-center justify-between">
                            <div class="price-area inline-block">
                                <span class="price">₹${s.price || 0}</span>
                                ${s.normal_price ? `<span class="ml-2 text-sm text-slate-400 line-through">₹${s.normal_price}</span>` : ''}
                            </div>
                            <button class="add-btn" 
                                    data-product-id="${s.id}"
                                    onclick="event.stopPropagation(); requireAuth(() => { window.pendingCartData = { itemId: '${s.id}', amount: '${jsSafeDuration}', itemType: 'service' }; window.executeGlobalAdd('service'); });">
                                <i class="fa-solid fa-cart-plus"></i>
                            </button>
                        </div>
                    </div>
                </div>`;
            }).join('');
            
            grid.innerHTML = html;
            if(window.lucide) window.lucide.createIcons();
            if(typeof window.renderCartBadges === 'function') window.renderCartBadges();
        }

        function switchTab(tab) {
            activeTab = tab;
            document.getElementById('tab-products').classList.remove('active');
            document.getElementById('tab-services').classList.remove('active');
            document.getElementById(`tab-${tab}`).classList.add('active');

            if (tab === 'products') {
                document.getElementById('products-container').classList.remove('hidden');
                document.getElementById('services-container').classList.add('hidden');
            } else {
                document.getElementById('products-container').classList.add('hidden');
                document.getElementById('services-container').classList.remove('hidden');
            }
        }

        document.addEventListener('DOMContentLoaded', initWishlist);
    </script>
</body>
</html>
