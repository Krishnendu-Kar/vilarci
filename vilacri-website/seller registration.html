<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vilarci Seller Nexus</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #4f46e5;
            --accent: #06b6d4;
            --bg-dark: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.85);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --danger: #ef4444;
            --success: #10b981;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 10% 20%, rgba(79, 70, 229, 0.15) 0%, transparent 20%),
                              radial-gradient(circle at 90% 80%, rgba(6, 182, 212, 0.15) 0%, transparent 20%);
            color: var(--text-main);
            padding: 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #page-loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark); z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        .container {
            width: 100%;
            max-width: 650px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: none;
        }

        .greeting-box {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--success);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 25px;
        }
        .greeting-box h3 { color: var(--success); margin: 0 0 5px 0; }
        .greeting-box p { margin: 0; font-size: 0.9rem; color: var(--text-main); }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            font-weight: 600;
            letter-spacing: 1px;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .steps {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            position: relative;
        }
        
        .steps::after {
            content: ''; position: absolute; bottom: 0; left: 0;
            width: 100%; height: 2px; background: rgba(255,255,255,0.1); z-index: 1;
        }

        .step {
            font-size: 0.9rem; color: var(--text-muted); padding-bottom: 10px;
            position: relative; z-index: 2; transition: 0.3s;
            border-bottom: 2px solid transparent; cursor: pointer;
        }

        .step.active {
            color: var(--accent); border-bottom: 2px solid var(--accent);
            text-shadow: 0 0 10px rgba(6, 182, 212, 0.5);
        }

        label {
            display: block; margin-top: 20px; font-size: 0.85rem;
            color: var(--text-muted); margin-bottom: 8px; letter-spacing: 0.5px;
        }

        input, select {
            width: 100%; padding: 12px 15px; background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border); border-radius: 8px;
            color: white; font-family: inherit; transition: all 0.3s ease;
            box-sizing: border-box;
        }

        input:focus, select:focus {
            outline: none; border-color: var(--accent);
            background: rgba(6, 182, 212, 0.05); box-shadow: 0 0 15px rgba(6, 182, 212, 0.2);
        }
        
        select { background-color: rgba(0,0,0,0.2); color: white; }
        option { background-color: var(--bg-dark); color: white; }
        
        input.invalid, select.invalid { border-color: var(--danger); box-shadow: 0 0 10px rgba(239, 68, 68, 0.2); }
        .error-msg { color: var(--danger); font-size: 0.75rem; margin-top: 5px; display: none; }

        .btn-group { display: flex; gap: 15px; margin-top: 30px; }
        .btn {
            flex: 1; padding: 14px; border: none; border-radius: 8px; font-size: 1rem;
            cursor: pointer; transition: all 0.3s; font-weight: 600;
        }
        .btn-primary { background: linear-gradient(135deg, var(--primary), #4338ca); color: white; box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4); }
        .btn-primary:hover { box-shadow: 0 6px 20px rgba(79, 70, 229, 0.6); transform: translateY(-1px); }
        .btn-secondary { background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: var(--text-muted); }
        .btn-secondary:hover { background: rgba(255,255,255,0.1); color: white; }

        .radio-group { display: flex; gap: 10px; }
        .radio-box {
            flex: 1; padding: 12px; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border);
            border-radius: 8px; text-align: center; cursor: pointer; transition: 0.3s; font-size: 0.9rem;
        }
        .radio-box.selected { background: rgba(79, 70, 229, 0.2); border-color: var(--primary); color: white; box-shadow: 0 0 15px rgba(79, 70, 229, 0.2); }

        .checkbox-group label { display: flex; align-items: center; gap: 12px; cursor: pointer; margin-top: 15px; color: var(--text-main); }
        .checkbox-group input { width: 18px; height: 18px; margin: 0; accent-color: var(--accent); }

        .form-section { display: none; }
        .form-section.active { display: block; animation: slideUp 0.5s ease forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="page-loader">
    <h3 style="color: var(--accent);">Verifying Identity...</h3>
</div>

<div class="container" id="main-container">
    <h2>VILARCI SELLER NEXUS</h2>

    <div class="greeting-box">
        <h3 id="greet-name">Hello, Seller</h3>
        <p id="greet-phone">Mobile: verifying...</p>
    </div>
    
    <div class="steps">
        <span id="indicator-1" class="step active" onclick="safeGoToStep(1)">01 STORE DETAILS</span>
        <span id="indicator-2" class="step" onclick="safeGoToStep(2)">02 FINANCE</span>
    </div>

    <div id="step-1" class="form-section active">
        <label>Store Name *</label>
        <input type="text" id="storeName" onkeyup="generateSlug()" placeholder="My Tech Store">
        <small class="error-msg">Required.</small>
        
        <label>Store Slug (Auto-generated)</label>
        <input type="text" id="slug" readonly style="opacity: 0.7; cursor: not-allowed;">
        
        <label>Selling Type *</label>
        <div class="radio-group" id="sellingTypeContainer">
            <div class="radio-box selected" onclick="selectType('Product', this)">Product</div>
            <div class="radio-box" onclick="selectType('Service', this)">Service</div>
            <div class="radio-box" onclick="selectType('Both', this)">Both</div>
        </div>
        <input type="hidden" id="sellingType" value="Product">

        <label>PAN Number *</label>
        <input type="text" id="panNumber" placeholder="ABCDE1234F" maxlength="10" style="text-transform: uppercase;">
        <small class="error-msg">Valid PAN required.</small>

        <label>Is your Annual Turnover > ₹40 Lakhs?</label>
        <div class="radio-group">
            <div class="radio-box" id="gstYes" onclick="toggleGst(true)">Yes</div>
            <div class="radio-box selected" id="gstNo" onclick="toggleGst(false)">No</div>
        </div>
        
        <div id="gst-container" style="display:none; margin-top: 10px;">
            <label style="color:var(--accent);">GSTIN Number *</label>
            <input type="text" id="gstin" placeholder="22AAAAA0000A1Z5" maxlength="15" style="text-transform: uppercase; border-color:var(--accent);">
            <small class="error-msg">GSTIN is required.</small>
        </div>

        <label>Pick up State *</label>
        <select id="stateSelect" onchange="loadDistricts()"><option value="">Select State</option></select>
        <small class="error-msg">Required.</small>
        
        <label>Pick up District *</label>
        <select id="districtSelect" onchange="loadSubAreas()"><option value="">Select District</option></select>
        <small class="error-msg">Required.</small>
        
        <label>Pick up Sub Area *</label>
        <select id="subAreaSelect"><option value="">Select Area</option></select>
        <small class="error-msg">Required.</small>

        <div class="btn-group">
            <button class="btn btn-primary" onclick="attemptToStep2()">Next: Finance</button>
        </div>
    </div>

    <div id="step-2" class="form-section">
        <label>Bank Account Holder Name *</label>
        <input type="text" id="bankHolder" placeholder="Name as per Passbook">
        <small class="error-msg">Required.</small>

        <label>Bank Name *</label>
        <input type="text" id="bankName" placeholder="e.g. HDFC Bank">
        <small class="error-msg">Required.</small>

        <label>Account Number *</label>
        <input type="text" id="accountNum" placeholder="Account Number">
        <small class="error-msg">Required.</small>

        <label>IFSC Code *</label>
        <input type="text" id="ifsc" placeholder="HDFC0001234" style="text-transform: uppercase;">
        <small class="error-msg">Required.</small>

        <div class="checkbox-group">
            <label><input type="checkbox" id="checkTerms"> I agree to Terms & Conditions</label>
            <label><input type="checkbox" id="checkValid"> I confirm all information is true</label>
        </div>

        <div class="btn-group">
            <button class="btn btn-secondary" onclick="goToStep(1)">Previous</button>
            <button class="btn btn-primary" onclick="finalSubmit()" id="btn-submit">Initialize Shop</button>
        </div>
    </div>
</div>

<script>
    // Changed variable name to 'sb' to prevent conflict with global 'supabase'
    const sb = window.supabaseClient; 
    let currentUser = null;
    let isGstRequired = false;

    // --- SECURITY & AUTH CHECK ---
    async function checkAuthAndLoad() {
        const { data: { session }, error } = await sb.auth.getSession();
        
        if (!session) {
            window.location.href = "user_login.html";
            return;
        }

        currentUser = session.user;

        // 1. Check if they are already a Seller
        const { data: sellerData } = await sb.from('sellers_private_089').select('id').eq('id', currentUser.id).single();
        
        if (sellerData) {
            alert("You already have a registered Seller Account!");
            window.location.href = "seller_profile.html";
            return;
        }

        // 2. Fetch their public.users data for the greeting
        const { data: userData } = await sb.from('users').select('first_name, whatsapp_number').eq('id', currentUser.id).single();

        if (userData) {
            document.getElementById('greet-name').innerText = `Hello ${userData.first_name}, Welcome to Seller Registration`;
            
            const mobile = userData.whatsapp_number;
            const maskedMobile = "******" + mobile.slice(-4);
            document.getElementById('greet-phone').innerText = `Your registered mobile: ${maskedMobile}`;
        }

        document.getElementById('page-loader').style.display = 'none';
        document.getElementById('main-container').style.display = 'block';

        loadStates();
    }

    window.onload = checkAuthAndLoad;


    // --- STEP LOGIC ---
    function toggleGst(required) {
        isGstRequired = required;
        const container = document.getElementById('gst-container');
        document.getElementById('gstYes').classList.toggle('selected', required);
        document.getElementById('gstNo').classList.toggle('selected', !required);
        container.style.display = required ? 'block' : 'none';
        if(!required) document.getElementById('gstin').value = "";
    }

    function validateStep1() {
        let isValid = true;
        const showError = (id, show) => {
            const el = document.getElementById(id);
            const msg = el.nextElementSibling;
            if(show) { el.classList.add('invalid'); if(msg) msg.style.display = 'block'; isValid = false; }
            else { el.classList.remove('invalid'); if(msg) msg.style.display = 'none'; }
        };
        showError('storeName', !document.getElementById('storeName').value.trim());
        showError('panNumber', !document.getElementById('panNumber').value.trim());
        showError('stateSelect', !document.getElementById('stateSelect').value);
        showError('districtSelect', !document.getElementById('districtSelect').value);
        showError('subAreaSelect', !document.getElementById('subAreaSelect').value);
        if(isGstRequired) showError('gstin', !document.getElementById('gstin').value.trim());
        return isValid;
    }

    function attemptToStep2() {
        if(validateStep1()) goToStep(2);
        else alert("Please fill in all required Store Details.");
    }

    function validateStep2() {
        let isValid = true;
        const showError = (id, show) => {
            const el = document.getElementById(id);
            const msg = el.nextElementSibling;
            if(show) { el.classList.add('invalid'); if(msg) msg.style.display = 'block'; isValid = false; }
            else { el.classList.remove('invalid'); if(msg) msg.style.display = 'none'; }
        };
        ['bankHolder', 'bankName', 'accountNum', 'ifsc'].forEach(id => showError(id, !document.getElementById(id).value.trim()));
        return isValid;
    }

    function safeGoToStep(targetStep) {
        if (targetStep === 2 && !validateStep1()) {
            alert("Please complete Store Details first.");
            return;
        }
        goToStep(targetStep);
    }

    function goToStep(step) {
        document.querySelectorAll('.form-section').forEach(el => el.classList.remove('active'));
        document.getElementById('step-' + step).classList.add('active');
        document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
        for(let i=1; i<=step; i++) document.getElementById('indicator-' + i).classList.add('active');
    }

    function generateSlug() {
        const name = document.getElementById('storeName').value;
        document.getElementById('slug').value = name.toLowerCase().replace(/ /g, '-').replace(/[^\w-]+/g, '');
    }

    function selectType(val, el) {
        document.getElementById('sellingType').value = val;
        document.querySelectorAll('#sellingTypeContainer .radio-box').forEach(b => b.classList.remove('selected'));
        el.classList.add('selected');
    }

    async function loadStates() {
        document.getElementById('stateSelect').innerHTML = '<option value="1">West Bengal</option>';
    }
    async function loadDistricts() {
        document.getElementById('districtSelect').innerHTML = '<option value="1">Purba Medinipur</option>';
    }
    async function loadSubAreas() {
        document.getElementById('subAreaSelect').innerHTML = '<option value="1">Tamluk</option>';
    }

    // --- SUBMISSION ---
    async function finalSubmit() {
        if (!validateStep2()) { alert("Please fill in Bank Details."); return; }
        if(!document.getElementById('checkTerms').checked || !document.getElementById('checkValid').checked) {
            return alert("Please accept Terms & Conditions and confirm information.");
        }

        const btn = document.getElementById('btn-submit');
        btn.innerText = "Processing...";
        btn.disabled = true;

        const payload = {
            _store_name: document.getElementById('storeName').value.trim(),
            _shop_slug: document.getElementById('slug').value.trim(),
            _selling_type: document.getElementById('sellingType').value,
            _pan_number: document.getElementById('panNumber').value.trim(),
            _gstin: isGstRequired ? document.getElementById('gstin').value.trim() : null,
            _state_id: parseInt(document.getElementById('stateSelect').value) || 0,
            _district_id: parseInt(document.getElementById('districtSelect').value) || 0,
            _sub_area_id: parseInt(document.getElementById('subAreaSelect').value) || 0,
            _bank_holder: document.getElementById('bankHolder').value.trim(),
            _bank_name: document.getElementById('bankName').value.trim(),
            _account_num: document.getElementById('accountNum').value.trim(),
            _ifsc: document.getElementById('ifsc').value.trim()
        };

        try {
            // Using 'sb' here too
            const { data, error } = await sb.rpc('register_new_seller', payload);

            if (error) throw error;

            alert("SUCCESS! Seller Account Created. Redirecting to Login...");
            
            document.querySelectorAll('input, button, select').forEach(el => el.disabled = true);
            
            setTimeout(() => window.location.href = 'login.html', 2000);

        } catch (err) {
            console.error(err);
            alert("Registration Failed: " + err.message);
            btn.innerText = "Initialize Shop";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
