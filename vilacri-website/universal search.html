<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Results | Vilarci</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!--For React App-->
    <script src="vilarci-bridge.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        :root {
            --vilarci-red: #ef3131;
            --vilarci-dark: #9E0303;
        }

        .bg-vilarci { background-color: var(--vilarci-red); }
        .text-vilarci { color: var(--vilarci-red); }
        .border-vilarci { border-color: var(--vilarci-red); }
        
        .search-shadow {
            box-shadow: 0 4px 20px -5px rgba(239, 49, 49, 0.2);
        }

        /* Custom Scrollbar for Filters */
        .filter-scroll::-webkit-scrollbar { width: 4px; }
        .filter-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }

        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <header class="bg-white border-b sticky top-0 z-50">
        <div class="max-w-[1400px] mx-auto px-4 py-3 flex items-center gap-6">
            <a href="index.html" class="flex items-center gap-2 shrink-0">
                <div class="bg-vilarci text-white w-10 h-10 flex items-center justify-center rounded-lg font-bold text-xl shadow-lg">V</div>
                <span class="text-2xl font-extrabold tracking-tighter text-slate-900 hidden md:block">Vilarci</span>
            </a>

            <div class="flex-grow max-w-3xl relative group">
                <input type="text" id="searchInput" 
                    placeholder="Search over 1 million products..." 
                    class="w-full bg-gray-100 border-transparent border-2 focus:border-vilarci focus:bg-white pl-12 pr-4 py-2.5 rounded-full outline-none transition-all text-sm md:text-base">
                <div class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-vilarci">
                    <i data-lucide="search" class="w-5 h-5"></i>
                </div>
            </div>

            <!-- <div class="flex items-center gap-4 text-gray-600">
                <button class="hover:text-vilarci transition"><i data-lucide="heart" class="w-6 h-6"></i></button>
                <div class="relative cursor-pointer hover:text-vilarci transition">
                    <i data-lucide="shopping-cart" class="w-6 h-6"></i>
                    <span class="absolute -top-2 -right-2 bg-vilarci text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full">3</span>
                </div>
            </div> -->
        </div>
    </header>

    <main class="max-w-[1400px] mx-auto px-4 py-6">
        <div class="flex flex-col md:flex-row gap-8">
            
            <aside class="w-full md:w-64 shrink-0 hidden md:block">
                <div class="sticky top-24">
                    <div class="flex items-center justify-between mb-6">
                        <h2 class="font-bold text-lg">Filters</h2>
                        <button class="text-xs text-vilarci font-semibold hover:underline">Clear All</button>
                    </div>

                    <div class="mb-8">
                        <h3 class="font-semibold mb-3 text-sm uppercase tracking-wider text-gray-500">Categories</h3>
                        <div class="space-y-2 filter-scroll">
                            <label class="flex items-center gap-3 cursor-pointer group">
                                <input type="checkbox" class="w-4 h-4 rounded accent-red-500">
                                <span class="text-gray-600 group-hover:text-black transition">Electronics</span>
                            </label>
                            <label class="flex items-center gap-3 cursor-pointer group">
                                <input type="checkbox" class="w-4 h-4 rounded accent-red-500">
                                <span class="text-gray-600 group-hover:text-black transition">Fashion</span>
                            </label>
                            <label class="flex items-center gap-3 cursor-pointer group">
                                <input type="checkbox" class="w-4 h-4 rounded accent-red-500">
                                <span class="text-gray-600 group-hover:text-black transition">Home & Living</span>
                            </label>
                        </div>
                    </div>

                    <div class="mb-8">
                        <h3 class="font-semibold mb-3 text-sm uppercase tracking-wider text-gray-500">Price Range</h3>
                        <div class="flex items-center gap-2">
                            <input type="number" placeholder="Min" class="w-full border rounded-md px-2 py-1 text-sm outline-none focus:border-vilarci">
                            <span class="text-gray-400">-</span>
                            <input type="number" placeholder="Max" class="w-full border rounded-md px-2 py-1 text-sm outline-none focus:border-vilarci">
                        </div>
                    </div>

                    <div>
                        <h3 class="font-semibold mb-3 text-sm uppercase tracking-wider text-gray-500">Rating</h3>
                        <div class="space-y-2">
                            <button class="flex items-center gap-1 text-yellow-400 text-sm">
                                <i data-lucide="star" class="fill-current w-4 h-4"></i>
                                <i data-lucide="star" class="fill-current w-4 h-4"></i>
                                <i data-lucide="star" class="fill-current w-4 h-4"></i>
                                <i data-lucide="star" class="fill-current w-4 h-4"></i>
                                <span class="text-gray-600 ml-1">& Up</span>
                            </button>
                        </div>
                    </div>
                </div>
            </aside>

            <section class="flex-grow">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4">
                    <div>
                        <h1 class="text-xl font-bold text-slate-900" id="result-text">Showing results for "Smartphones"</h1>
                        <p class="text-sm text-gray-500">1,240 items found</p>
                    </div>
                    
                    <div class="flex items-center gap-3 w-full sm:w-auto">
                        <select class="bg-white border rounded-lg px-4 py-2 text-sm outline-none focus:border-vilarci cursor-pointer w-full">
                            <option>Sort by: Relevance</option>
                            <option>Price: Low to High</option>
                            <option>Price: High to Low</option>
                            <option>Newest First</option>
                        </select>
                    </div>
                </div>

                <div id="skeleton-grid" class="grid grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                    <div class="bg-white rounded-2xl p-3 border border-transparent animate-pulse">
                        <div class="bg-gray-200 aspect-square rounded-xl mb-4"></div>
                        <div class="h-4 bg-gray-200 rounded w-3/4 mb-2"></div>
                        <div class="h-4 bg-gray-200 rounded w-1/2"></div>
                    </div>
                </div>

                <div id="results-grid" class="hidden grid grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 md:gap-6">
                    <div class="product-card bg-white rounded-2xl p-3 border border-gray-100 transition-all duration-300 group cursor-pointer">
                        <div class="relative aspect-square rounded-xl overflow-hidden bg-gray-50 mb-3">
                            <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?auto=format&fit=crop&q=80&w=500" class="object-cover w-full h-full group-hover:scale-110 transition-transform duration-500">
                            <button class="absolute top-2 right-2 p-2 bg-white/80 backdrop-blur-md rounded-full text-gray-400 hover:text-vilarci transition">
                                <i data-lucide="heart" class="w-4 h-4"></i>
                            </button>
                            <div class="absolute bottom-2 left-2 bg-vilarci text-white text-[10px] font-bold px-2 py-0.5 rounded">
                                BESTSELLER
                            </div>
                        </div>
                        <h3 class="font-semibold text-slate-800 text-sm md:text-base line-clamp-2 mb-1">Vilarci Pro Smartphone - 256GB Platinum</h3>
                        <div class="flex items-center gap-1 mb-2">
                            <div class="flex text-yellow-400">
                                <i data-lucide="star" class="w-3 h-3 fill-current"></i>
                            </div>
                            <span class="text-[11px] text-gray-500">(4.8)</span>
                        </div>
                        <div class="flex items-center justify-between mt-auto">
                            <div>
                                <span class="text-lg font-bold text-slate-900">₹54,999</span>
                                <span class="text-[11px] text-gray-400 line-through block">₹59,999</span>
                            </div>
                            <button class="bg-vilarci text-white p-2 rounded-lg hover:bg-vilarci-dark transition shadow-md shadow-red-100">
                                <i data-lucide="shopping-cart" class="w-5 h-5"></i>
                            </button>
                        </div>
                    </div>
                    </div>
            </section>
        </div>
    </main>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        // Simulate Loading State
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('skeleton-grid').classList.add('hidden');
                document.getElementById('results-grid').classList.remove('hidden');
                // Re-trigger icon creation for injected elements
                lucide.createIcons();
            }, 1500);
        });

        function handleEnter(e) {
            if (e.key === 'Enter') {
                console.log('Searching for:', e.target.value);
                // Your Supabase logic here
            }
        }
    </script>
</body>
</html>
