<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service List - Vilarci</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" type="text/css" href="product-card.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">

    <div id="vilarci-header"></div>

    <main class="flex-1 p-4 sm:p-6 lg:p-8">
        <nav id="breadcrumb-container" class="text-sm font-medium text-slate-500 mb-3 hidden flex items-center gap-2 overflow-x-auto whitespace-nowrap">
        </nav>
        <div class="flex justify-between items-end mb-6">
            <div>
                <span class="text-xs font-bold text-indigo-600 uppercase tracking-wide">Filtered Results</span>
                <h1 id="page-title" class="text-2xl sm:text-3xl font-bold text-slate-900 mt-1">Services</h1>
            </div>
        </div>

        <div id="skeleton-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 animate-pulse hidden">
            <div class="bg-white border border-slate-200 rounded-xl overflow-hidden flex flex-col h-[320px]"><div class="aspect-[4/3] bg-slate-200"></div><div class="p-4 flex flex-col flex-grow"><div class="h-5 bg-slate-200 rounded-md w-3/4 mb-3"></div><div class="h-4 bg-slate-200 rounded-md w-1/2 mb-auto"></div><div class="flex items-center justify-between mt-4"><div class="h-6 bg-slate-200 rounded-md w-1/3"></div><div class="h-8 w-8 bg-slate-200 rounded-md"></div></div></div></div>
            <div class="bg-white border border-slate-200 rounded-xl overflow-hidden flex flex-col h-[320px]"><div class="aspect-[4/3] bg-slate-200"></div><div class="p-4 flex flex-col flex-grow"><div class="h-5 bg-slate-200 rounded-md w-3/4 mb-3"></div><div class="h-4 bg-slate-200 rounded-md w-1/2 mb-auto"></div><div class="flex items-center justify-between mt-4"><div class="h-6 bg-slate-200 rounded-md w-1/3"></div><div class="h-8 w-8 bg-slate-200 rounded-md"></div></div></div></div>
            <div class="bg-white border border-slate-200 rounded-xl overflow-hidden flex flex-col h-[320px]"><div class="aspect-[4/3] bg-slate-200"></div><div class="p-4 flex flex-col flex-grow"><div class="h-5 bg-slate-200 rounded-md w-3/4 mb-3"></div><div class="h-4 bg-slate-200 rounded-md w-1/2 mb-auto"></div><div class="flex items-center justify-between mt-4"><div class="h-6 bg-slate-200 rounded-md w-1/3"></div><div class="h-8 w-8 bg-slate-200 rounded-md"></div></div></div></div>
            <div class="bg-white border border-slate-200 rounded-xl overflow-hidden flex flex-col h-[320px] hidden sm:flex"><div class="aspect-[4/3] bg-slate-200"></div><div class="p-4 flex flex-col flex-grow"><div class="h-5 bg-slate-200 rounded-md w-3/4 mb-3"></div><div class="h-4 bg-slate-200 rounded-md w-1/2 mb-auto"></div><div class="flex items-center justify-between mt-4"><div class="h-6 bg-slate-200 rounded-md w-1/3"></div><div class="h-8 w-8 bg-slate-200 rounded-md"></div></div></div></div>
            <div class="bg-white border border-slate-200 rounded-xl overflow-hidden flex flex-col h-[320px] hidden lg:flex"><div class="aspect-[4/3] bg-slate-200"></div><div class="p-4 flex flex-col flex-grow"><div class="h-5 bg-slate-200 rounded-md w-3/4 mb-3"></div><div class="h-4 bg-slate-200 rounded-md w-1/2 mb-auto"></div><div class="flex items-center justify-between mt-4"><div class="h-6 bg-slate-200 rounded-md w-1/3"></div><div class="h-8 w-8 bg-slate-200 rounded-md"></div></div></div></div>
            <div class="bg-white border border-slate-200 rounded-xl overflow-hidden flex flex-col h-[320px] hidden lg:flex"><div class="aspect-[4/3] bg-slate-200"></div><div class="p-4 flex flex-col flex-grow"><div class="h-5 bg-slate-200 rounded-md w-3/4 mb-3"></div><div class="h-4 bg-slate-200 rounded-md w-1/2 mb-auto"></div><div class="flex items-center justify-between mt-4"><div class="h-6 bg-slate-200 rounded-md w-1/3"></div><div class="h-8 w-8 bg-slate-200 rounded-md"></div></div></div></div>
        </div>

        <div id="services-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
        </div>
        <div id="services-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>

        <div id="loading-trigger" class="py-12 flex justify-center w-full">
            <div id="spinner" ></div>
            <p id="end-message" class="hidden text-slate-400 text-sm font-medium">No more services found.</p>
        </div>
    </main>

    <script src="config.js"></script>
    <script src="header.js"></script>

    <script>
        // 1. GET DB CLIENT
        const db = window.supabaseClient;

        // 2. PARSE URL PARAMETERS
        const urlParams = new URLSearchParams(window.location.search);
        const categoryId = urlParams.get('category_id');
        const subId = urlParams.get('sub_id');

        // 3. PAGINATION STATE
        let loadedCount = 0;
        let isLoading = false;
        let allLoaded = false;
        const INITIAL_BATCH = 25;
        const NEXT_BATCH = 14;

        // 4. SMART DB FETCHING (Location & Category Aware)
        async function loadFilteredServices(isLoadMore = false) {
            const grid = document.getElementById('services-grid');

            // 🌟 RESET STATE
            if (!isLoadMore) {
                loadedCount = 0;
                allLoaded = false;
                if(grid) grid.innerHTML = '';
                document.getElementById('skeleton-grid').classList.remove('hidden'); // Show Skeleton
                document.getElementById('spinner').classList.add('hidden'); // Hide infinite scroll spinner
                document.getElementById('end-message').classList.add('hidden');
            } else {
                document.getElementById('spinner').classList.remove('hidden'); // Show bottom spinner on scroll
            }

            if (isLoading || allLoaded || !db) return;
            isLoading = true;

            try {
                // 🌟 STEP A: Smart Location Check
                const savedLoc = localStorage.getItem('vilarci_user_location');
                let validSellerIds = null;

                if (savedLoc) {
                    const locObj = JSON.parse(savedLoc);
                    let subZoneIds = [];

                    if (locObj.type === 'district') {
                        const { data } = await db.from('sub_zones').select('id').eq('district_id', locObj.id);
                        subZoneIds = data ? data.map(z => z.id) : [];
                    } else if (locObj.type === 'main_zone') {
                        const { data } = await db.from('sub_zones').select('id').eq('main_zone_id', locObj.id);
                        subZoneIds = data ? data.map(z => z.id) : [];
                    } else {
                        subZoneIds = [parseInt(locObj.id)];
                    }

                    if (subZoneIds.length > 0) {
                        const { data: sellers } = await db.from('seller_delivery_zones').select('seller_id').in('sub_zone_id', subZoneIds);
                        validSellerIds = sellers ? [...new Set(sellers.map(s => s.seller_id))] : [];
                    } else {
                        validSellerIds = [];
                    }
                }

                // 🌟 STEP B: Empty State if No Providers
                if (validSellerIds !== null && validSellerIds.length === 0) {
                    if (!isLoadMore) {
                        grid.innerHTML = `
                            <div class="col-span-full text-center py-16">
                                <i data-lucide="map-pin-off" class="w-14 h-14 mx-auto text-slate-300 mb-4"></i>
                                <h3 class="text-xl font-bold text-slate-700 mb-1">No Services Available</h3>
                                <p class="text-slate-500 font-medium">We don't have providers in this area yet.</p>
                            </div>`;
                        if(window.lucide) window.lucide.createIcons();
                    }
                    allLoaded = true;
                    stopLoadingUI();
                    return;
                }

                const limit = loadedCount === 0 ? INITIAL_BATCH : NEXT_BATCH;
                const from = loadedCount;
                const to = from + limit - 1;

                // Start Building the Query (Cleaned up!)
            let query = db
                .from('services')
                .select('id,name, slug, price, normal_price, images, badge_label, service_duration')
                .eq('is_active', true) 
                .range(from, to)
                .order('id', { ascending: true });

                // Category Filters
                if (categoryId) {
                    query = query.eq('service_category_id', categoryId);
                    document.getElementById('page-title').innerText = "Category Results";
                } else if (subId) {
                    query = query.eq('service_sub_category_id', subId);
                    document.getElementById('page-title').innerText = "Sub-Category Results";
                }

                // Location Filter
                if (validSellerIds !== null && validSellerIds.length > 0) {
                    query = query.in('seller_id', validSellerIds);
                }

                const { data, error } = await query;

                if (error) throw error;

                if (!data || data.length === 0) {
                    allLoaded = true;
                    if (!isLoadMore) {
                        grid.innerHTML = `
                            <div class="col-span-full text-center py-16 text-slate-500">
                                <i data-lucide="briefcase" class="w-12 h-12 mx-auto text-slate-300 mb-3"></i>
                                <p class="font-bold">No services found in this category for your area.</p>
                            </div>`;
                        if(window.lucide) window.lucide.createIcons();
                    }
                    stopLoadingUI();
                    return;
                }

                renderCards(data);
                loadedCount += data.length;

                if (data.length < limit) {
                    allLoaded = true;
                    stopLoadingUI();
                }

            } catch (err) {
                console.error("Fetch Error:", err);
            } finally {
                isLoading = false;
                if (!isLoadMore) {
                    document.getElementById('skeleton-grid').classList.add('hidden'); // Hide Skeleton
                }
            }
        }

        // 5. RENDER CARDS
        function renderCards(services) {
            const grid = document.getElementById('services-grid');
            services.forEach(svc => {
                const card = document.createElement('div');
                card.className = "bg-white border border-slate-200 rounded-xl overflow-hidden hover:shadow-lg transition cursor-pointer flex flex-col h-full";
                card.onclick = () => window.location.href = `service_details.html?slug=${svc.slug}`;

                const imgUrl = (svc.images && svc.images.length > 0) ? svc.images[0] : 'logo.png';
                
                let priceHtml = `<span class="text-lg font-bold text-slate-900">₹${svc.price}</span>`;
                if (svc.normal_price && svc.normal_price > svc.price) {
                    priceHtml += `<span class="ml-2 text-sm text-slate-400 line-through">₹${svc.normal_price}</span>`;
                }

                let discountServiceBadge = '';
                    if (svc.normal_price && svc.price < svc.normal_price) {
                        const off = Math.round(((svc.normal_price - svc.price) / svc.normal_price) * 100);
                        discountServiceBadge = `<span class="discount-percent top-0 z-10">${off}% OFF</span>`;
                    }
                // ADD THIS LINE to safely escape the duration for the onclick function
                const jsSafeDuration = (svc.service_duration || '1 Session').replace(/'/g, "\\'").replace(/"/g, '&' + 'quot;');

                card.innerHTML = `
                    <div class="relative aspect-[4/3] bg-slate-100 flex items-center justify-center overflow-hidden">
                        ${discountServiceBadge}
                        <button class="wishlist-btn absolute top-7 right-2 p-1.5 bg-gradient-to-r from-[#FFF0F0] to-[#FFF0FC] backdrop-blur-sm rounded-full shadow-sm hover:scale-110 transition z-20 text-slate-400 flex items-center justify-center w-8 h-8 border border-slate-100/50" 
                                data-item-id="${svc.id}" 
                                onclick="window.toggleWishlist(event, '${svc.id}', 'service')">
                            <i class="fa-regular text-red-500 fa-heart text-[15px] drop-shadow-sm transition-colors"></i>
                        </button>
                        <img src="${imgUrl}" class="w-full h-full object-cover">
                        ${svc.badge_label ? `<span class="absolute top-2 left-2 bg-indigo-600 text-white text-[10px] font-bold px-2 py-1 rounded shadow">${svc.badge_label}</span>` : ''}
                    </div>
                    <div class="p-4 flex flex-col flex-grow">
                        <h3 class="font-bold text-slate-900 mb-1 line-clamp-2">${svc.name}</h3>
                        <div class="flex items-center gap-2 text-xs text-slate-500 mb-4">
                            <i data-lucide="clock" class="w-3 h-3"></i> ${svc.service_duration || ''}
                        </div>
                        <div class="mt-auto flex items-center justify-between">
                            <div>${priceHtml}</div>
                         
                            <button class="add-btn" 
                                data-product-id="${svc.id}"
                                onclick="event.stopPropagation(); requireAuth(() => { window.pendingCartData = { itemId: '${svc.id}', amount: '${jsSafeDuration}', itemType: 'service' }; window.executeGlobalAdd('service'); });">
                                <i class="fa-solid fa-cart-plus"></i>
                            </button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
            
            if(window.lucide) window.lucide.createIcons();
            if(typeof window.renderWishlistIcons === 'function') window.renderWishlistIcons();
        }

        function stopLoadingUI() {
            document.getElementById('spinner').classList.add('hidden');
            const endMsg = document.getElementById('end-message');
            endMsg.classList.remove('hidden');
            if (loadedCount === 0) {
                endMsg.innerText = "No services available.";
                endMsg.classList.add('text-lg', 'text-slate-500'); 
            }
        }
        // ==========================================
        // 🌟 DYNAMIC BREADCRUMB ENGINE (SERVICES)
        // ==========================================
        async function buildBreadcrumbs() {
            const bcContainer = document.getElementById('breadcrumb-container');
            const pageTitle = document.getElementById('page-title');
            let breadcrumbs = [{ name: 'Home', url: 'index.html' }, { name: 'Services', url: 'services.html' }];
            
            try {
                if (subId) {
                    // Fetch Sub-Category and its Parent Category
                    const { data: subData } = await db.from('service_sub_categories').select('name, category_id').eq('id', subId).single();
                    if (subData) {
                        const { data: catData } = await db.from('service_categories').select('name').eq('id', subData.category_id).single();
                        if (catData) breadcrumbs.push({ name: catData.name, url: `service_list.html?category_id=${subData.category_id}` });
                        
                        breadcrumbs.push({ name: subData.name, url: null });
                        if (pageTitle) pageTitle.innerText = subData.name; // Dynamically update Title
                    }
                } else if (categoryId) {
                    // Fetch Category only
                    const { data: catData } = await db.from('service_categories').select('name').eq('id', categoryId).single();
                    if (catData) {
                        breadcrumbs.push({ name: catData.name, url: null });
                        if (pageTitle) pageTitle.innerText = catData.name; // Dynamically update Title
                    }
                }

                // Render the Breadcrumbs
                if (breadcrumbs.length > 2) { 
                    bcContainer.innerHTML = breadcrumbs.map((bc, i) => {
                        if (i === breadcrumbs.length - 1 || !bc.url) {
                            return `<span class="text-slate-800 font-bold">${bc.name}</span>`;
                        }
                        return `<a href="${bc.url}" class="hover:text-indigo-600 transition cursor-pointer">${bc.name}</a> <i class="fa-solid fa-chevron-right text-[10px] text-slate-400 mt-0.5"></i>`;
                    }).join('');
                    bcContainer.classList.remove('hidden');
                }
            } catch (err) {
                console.error("Breadcrumb Fetch Error:", err);
            }
        }
        // 6. INITIALIZATION & RELOAD LISTENER
        document.addEventListener('DOMContentLoaded', () => {
            
            buildBreadcrumbs(); // 🌟 Trigger the breadcrumb generation

            const observer = new IntersectionObserver((entries) => {
                if (entries[0].isIntersecting) loadFilteredServices(true);
            }, { rootMargin: '100px' });
            
            observer.observe(document.getElementById('loading-trigger'));
            
            // First load
            loadFilteredServices(false);
        });

        // 🌟 INSTANT RELOAD WHEN LOCATION CHANGES!
        window.addEventListener('vilarciLocationChanged', () => loadFilteredServices(false));
    </script>
</body>
</html>
