<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Successful - Vilarci</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        main { margin-top: 80px; }
        .success-animation { animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>
    <div id="vilarci-header"></div>

    <main class="max-w-xl mx-auto px-4 py-12" id="main-content">
        <div class="text-center py-20">
            <div class="animate-spin rounded-full h-12 w-12 border-b-4 border-red-600 mx-auto"></div>
        </div>
    </main>

    <script src="header.js"></script>
    <script>
        const sb = window.supabaseClient;
        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('order_id');

        async function initSuccess() {
            lucide.createIcons();
            if (!orderId) { window.location.href = 'index.html'; return; }

            const { data: { session } } = await sb.auth.getSession();
            if (!session) { window.location.href = "user_login.html"; return; }

            try {
                // Fetch just the summary details, no sub-items needed here
                const { data: order, error } = await sb.from('orders')
                    .select('id, grand_total, payment_method, created_at')
                    .eq('id', orderId)
                    .eq('user_id', session.user.id)
                    .single();

                if (error) throw error;

                document.getElementById('main-content').innerHTML = `
                    <div class="bg-white rounded-2xl p-8 text-center shadow-sm border border-slate-200 success-animation">
                        <div class="w-24 h-24 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6">
                            <i data-lucide="check-circle" class="w-12 h-12"></i>
                        </div>
                        <h1 class="text-3xl font-extrabold text-slate-900 mb-2">Order Placed!</h1>
                        <p class="text-slate-500 font-medium mb-8">Thank you for shopping with Vilarci. Your order <span class="text-slate-800 font-bold">${order.id}</span> has been confirmed.</p>
                        
                        <div class="bg-slate-50 rounded-xl p-4 mb-8 inline-block mx-auto text-left">
                            <p class="text-sm text-slate-500 mb-1">Amount to Pay: <strong class="text-slate-900 text-lg">₹${order.grand_total}</strong></p>
                            <p class="text-sm text-slate-500">Method: <strong class="text-slate-900">${order.payment_method}</strong></p>
                        </div>

                        <div class="flex flex-col sm:flex-row gap-4 justify-center">
                            <button onclick="window.location.href='order_tracking.html?order_id=${order.id}'" class="px-8 py-3.5 bg-red-600 text-white font-bold rounded-xl hover:bg-red-700 transition w-full sm:w-auto shadow-md shadow-red-200">
                                Track Order
                            </button>
                            <button onclick="window.location.href='orders.html'" class="px-8 py-3.5 bg-slate-100 text-slate-700 font-bold rounded-xl hover:bg-slate-200 transition w-full sm:w-auto">
                                View All Orders
                            </button>
                        </div>
                    </div>
                `;
                lucide.createIcons();

            } catch (err) {
                console.error(err);
                window.location.href = 'orders.html';
            }
        }
        document.addEventListener('DOMContentLoaded', initSuccess);
    </script>
</body>
</html>
