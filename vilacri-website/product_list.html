<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - Vilarci</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" type="text/css" href="product-card.css">
    <link rel="stylesheet" type="text/css" href="style.css">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        .results-title {
            font-size: 20px;
            font-weight: 600;
            display: inline-block;
            margin-right: 12px;
        }
        
        .results-count {
            font-size: 14px;
            color: #878787;
        }
        /* Wishlist Icon */
        .wishlist-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            color: #c2c2c2;
            font-size: 18px;
            z-index: 10;
            transition: color 0.2s;
        }
        .wishlist-btn:hover { color: #ff4343; }

        footer {
            width: 100%;
            background: brown;
            color: #fff;
            text-align: center;
            padding: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="loader-container" id="page-loader">
        <div class="loaderout"><div class="loaderin1"><div class="loaderin2"><div class="loaderin3"></div></div></div></div>
        <p class="loader-p">Loading...</p>
    </div>

    <script src="header.js"></script>
    <div id="vilarci-header"></div>

    <main class="vilarci-layout">
        <div class="results-header">
            <div>
                <span class="results-count" id="result-count">(Fetching...)</span>
            </div>
        </div>

        <div id="productList" class="new-product-grid">
            </div>
    </main>

    <footer>
        ©2026 Vilarci - All Rights Reserved
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="sidebar.js"></script>
    <script>
       const urlParams = new URLSearchParams(window.location.search);
        const categoryId = urlParams.get('category_id');
        const subCategoryId = urlParams.get('sub_category_id');
        const superSubId = urlParams.get('super_sub_id');
        const searchQuery = urlParams.get('search');

        let currentOffset = 0;
        const LIMIT = 24;
        let isFetching = false;
        let allProductsLoaded = false;

        async function fetchProducts(isLoadMore = false) {
            const container = document.getElementById('productList');
            const countDisplay = document.getElementById('result-count');
            const pageLoader = document.getElementById('page-loader'); 
            
            // Switch container to standard shop grid
            container.className = "shop-section";

            if(!isLoadMore) {
                currentOffset = 0;
                allProductsLoaded = false; 
                if (container) container.innerHTML = '';
                if(pageLoader) pageLoader.style.display = 'flex';
                if(countDisplay) countDisplay.innerText = '(Searching...)';
            }

            if (!container || isFetching || allProductsLoaded) return; 
            isFetching = true;

            try {
                const savedLoc = localStorage.getItem('vilarci_user_location');
                let validSellerIds = null;

                if (savedLoc) {
                    const locObj = JSON.parse(savedLoc);
                    let subZoneIds = [];

                    if (locObj.type === 'district') {
                        const { data } = await window.supabaseClient.from('sub_zones').select('id').eq('district_id', locObj.id);
                        subZoneIds = data ? data.map(z => z.id) : [];
                    } else if (locObj.type === 'main_zone') {
                        const { data } = await window.supabaseClient.from('sub_zones').select('id').eq('main_zone_id', locObj.id);
                        subZoneIds = data ? data.map(z => z.id) : [];
                    } else {
                        subZoneIds = [parseInt(locObj.id)];
                    }

                    if (subZoneIds.length > 0) {
                        const { data: sellers } = await window.supabaseClient.from('seller_delivery_zones').select('seller_id').in('sub_zone_id', subZoneIds);
                        validSellerIds = sellers ? [...new Set(sellers.map(s => s.seller_id))] : [];
                    } else {
                        validSellerIds = [];
                    }
                }

                if (validSellerIds !== null && validSellerIds.length === 0) {
                    if(!isLoadMore) {
                        container.innerHTML = `
                            <div style="text-align:center; padding: 60px 20px; grid-column: 1/-1; width:100%; background: #fff; border-radius: 4px;">
                                <i data-lucide="map-pin-off" style="width: 56px; height: 56px; margin: 0 auto 16px; color: #cbd5e1;"></i>
                                <h2 style="font-size: 18px; color: #334155; margin-bottom: 8px;">No Delivery Available</h2>
                                <p style="font-weight: 400; color: #64748b;">We currently do not have sellers delivering to your selected area.</p>
                            </div>`;
                        if(window.lucide) window.lucide.createIcons();
                        countDisplay.innerText = '(0 Items)';
                    }
                    allProductsLoaded = true;
                    return;
                }

                if (!isLoadMore) {
                    let countQuery = window.supabaseClient.from('products').select('*', { count: 'exact', head: true }).eq('is_active', true);
                    if (validSellerIds !== null && validSellerIds.length > 0) countQuery = countQuery.in('seller_id', validSellerIds);
                    if (superSubId) countQuery = countQuery.eq('super_sub_id', superSubId);
                    else if (subCategoryId) countQuery = countQuery.eq('sub_category_id', subCategoryId);
                    else if (categoryId) countQuery = countQuery.eq('category_id', categoryId);
                    else if (searchQuery) countQuery = countQuery.ilike('name', `%${searchQuery}%`);
                    
                    const { count } = await countQuery;
                    countDisplay.innerText = count ? `(Showing ${count} products)` : '(0 Items)';
                }

                // 🌟 FETCH FLAGS INCLUDED HERE
                let query = window.supabaseClient
                    .from('products')
                    .select('id, slug, name, base_price, original_price, rating_avg, rating_count, images, category_id, amount, is_rapid_eligible, is_pickup_eligible')
                    .eq('is_active', true)
                    .order('created_at', { ascending: false })
                    .range(currentOffset, currentOffset + LIMIT - 1);

                if (validSellerIds !== null && validSellerIds.length > 0) query = query.in('seller_id', validSellerIds);
                if (superSubId) query = query.eq('super_sub_id', superSubId);
                else if (subCategoryId) query = query.eq('sub_category_id', subCategoryId);
                else if (categoryId) query = query.eq('category_id', categoryId);
                else if (searchQuery) query = query.ilike('name', `%${searchQuery}%`);

                const { data: products, error } = await query;
                if (error) throw error;

                if (!products || products.length === 0) {
                    if(!isLoadMore) {
                        container.innerHTML = `
                            <div style="text-align:center; padding: 60px 20px; background: #fff; border-radius: 4px; grid-column: 1 / -1;">
                                <i data-lucide="package-x" style="width: 56px; height: 56px; margin: 0 auto 16px; color: #cbd5e1;"></i>
                                <h2 style="font-size: 18px; color: #334155; margin-bottom: 8px;">No Products Found</h2>
                                <p style="font-weight: 400; color: #64748b;">Try adjusting your search for something else.</p>
                            </div>`;
                        if(window.lucide) window.lucide.createIcons();
                    }
                    allProductsLoaded = true;
                    return;
                }

                if (products.length < LIMIT) allProductsLoaded = true;
                currentOffset += products.length;

                let html = '';
                products.forEach(p => {
                    const displayImage = (p.images && p.images.length > 0) ? p.images[0] : 'logo.png';
                    const displayPrice = p.base_price ? parseFloat(p.base_price) : 0;
                    const originalPrice = p.original_price ? parseFloat(p.original_price) : displayPrice;
                    
                    let discountBadge = '';
                    if (originalPrice > displayPrice) {
                        const off = Math.round(((originalPrice - displayPrice) / originalPrice) * 100);
                        discountBadge = `<div class="discount-percent">${off}% OFF</div>`;
                    }

                    const rating = p.rating_avg || 4.5;
                    const reviews = p.rating_count || 0;

                    // 🌟 USING THE NEW STANDARDIZED TEMPLATE
                    html += `
                        <div class="product-card" onclick="window.location.href='product_details.html?slug=${p.slug || p.id}'">
                            ${discountBadge}
                            <div class="img-box"><img src="${displayImage}" alt="${p.name}" loading="lazy"></div>
                            <div class="details">
                                <div>
                                    <h4 class="product-name">${p.name}</h4>
                                    <p><span class="rating_avg">${rating} <i class="fa-solid fa-star" style="font-size:0.6em;"></i></span> <span class="rating_count"> ${reviews} Ratings</span></p>
                                </div>
                                
                                <div class="price-area">
                                    <span class="price">₹${displayPrice}</span>
                                    ${originalPrice > displayPrice ? `<span class="mrp">₹${originalPrice}</span>` : ''}
                                </div>
                                
                                <div class="bottom-btn">
                                    <button class="add-btn" 
                                            data-product-id="${p.id}"
                                            onclick="event.stopPropagation(); window.vilarciAddToCart('${p.id}', ${displayPrice}, '1 Unit', ${p.is_rapid_eligible});">
                                        <i class="fa-solid fa-cart-plus"></i>
                                    </button>
                                    
                                    <button class="pickup-btn" 
                                            data-product-id="${p.id}"
                                            onclick="event.stopPropagation(); window.vilarciStorePickup('${p.id}', ${displayPrice}, '1 Unit', ${p.is_pickup_eligible});">
                                        Store Pickup <i class="fa-solid fa-motorcycle"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                });
                
                container.innerHTML += html;

                // 🌟 TRIGGER BADGE RENDERER
                if(typeof window.renderCartBadges === 'function') window.renderCartBadges();

            } catch (err) {
                console.error("Error:", err);
                if(!isLoadMore) {
                    container.innerHTML = `<div style="color: red; padding: 20px; text-align: center; background: #fff; grid-column: 1/-1;">Failed to load products. Please check your connection.</div>`;
                    countDisplay.innerText = '(Error)';
                }
            } finally {
                if (!isLoadMore && pageLoader) pageLoader.style.display = 'none';
                isFetching = false;
            }
        }

        window.addEventListener('scroll', () => {
            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 600) fetchProducts(true);
        });

        document.addEventListener('DOMContentLoaded', () => fetchProducts(false));
        window.addEventListener('vilarciLocationChanged', () => fetchProducts(false));
        
        </script>
</body>
</html>
