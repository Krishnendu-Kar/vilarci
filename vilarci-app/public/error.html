<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Offline</title>
  <style>
    body { margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; background-color: #ffffff; text-align: center; }
    .icon { width: 70px; height: 70px; opacity: 0.3; margin-bottom: 20px; }
    h1 { color: #d32f2f; font-style: italic; margin: 0 0 5px 0; font-size: 28px; font-weight: 900; letter-spacing: -1px;}
    p { margin: 0 0 25px 0; color: #6b7280; font-size: 15px; line-height: 1.4; padding: 0 40px;}
    
    .loader { border: 3px solid #f3f3f3; border-top: 3px solid #d32f2f; border-radius: 50%; width: 26px; height: 26px; animation: spin 0.8s linear infinite; display: none; margin: 0 auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    button { background-color: #d32f2f; color: white; border: none; padding: 12px 28px; border-radius: 8px; font-weight: bold; margin-top: 10px; cursor: pointer; display: block; font-size: 15px;}
    button:active { transform: scale(0.95); }
  </style>
</head>
<body>

  <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#d32f2f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <line x1="1" y1="1" x2="23" y2="23"></line>
    <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"></path>
    <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"></path>
    <path d="M10.71 5.05A16 16 0 0 1 22.58 9"></path>
    <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"></path>
    <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
    <line x1="12" y1="20" x2="12.01" y2="20"></line>
  </svg>

  <h1>Vilarci</h1>
  <p id="status-text">You're offline.<br>Waiting for connection...</p>
  <div class="loader" id="spinner"></div>
  <button id="retry-btn" onclick="manualRetry()">Retry Connection</button>

  <script>
    const spinner = document.getElementById('spinner');
    const statusText = document.getElementById('status-text');
    const retryBtn = document.getElementById('retry-btn');
    const targetUrl = 'https://krishnendu-kar.github.io/vilarci/';

    // 🔴 MASTERMIND FIX 3: Smart State-Retention Routing
    function executeReconnect() {
      statusText.innerHTML = "Reconnecting...";
      spinner.style.display = 'block';
      retryBtn.style.display = 'none';
      
      setTimeout(() => {
        // If the app has history, go back to the exact product they were viewing
        if (window.history.length > 1) {
            window.history.back();
        } else {
            // Only go to the home page if they opened the app completely offline
            window.location.href = 'https://krishnendu-kar.github.io/vilarci/';
        }
      }, 500);
    }

    function autoReconnect() {
      if (navigator.onLine) { executeReconnect(); }
    }

    function manualRetry() {
      if (navigator.onLine) { executeReconnect(); } 
      else { alert("Still no internet connection detected."); }
    }

    window.addEventListener('online', autoReconnect);
    setInterval(autoReconnect, 2500);
  </script>
</body>
</html>
